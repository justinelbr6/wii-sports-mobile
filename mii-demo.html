<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mii — Personnalisation</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Nunito',sans-serif;
      background:linear-gradient(160deg,#a8e4f7 0%,#5bbde8 40%,#a0d8f0 100%);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:flex-start;gap:16px;padding:20px;
      overflow-y:auto;
    }
    h1{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#1a4a80;text-shadow:0 2px 0 rgba(255,255,255,0.6);margin-top:4px;}
    #preview-wrap{
      width:100%;max-width:420px;border-radius:24px;overflow:hidden;
      box-shadow:0 16px 50px rgba(0,60,140,0.25);border:3px solid rgba(255,255,255,0.8);
    }
    #threeCanvas{width:100%;display:block;}
    .panel{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;}
    .card{
      background:rgba(255,255,255,0.52);border-radius:18px;padding:13px 15px;
      border:2px solid rgba(255,255,255,0.75);display:flex;flex-direction:column;gap:9px;
      box-shadow:0 4px 14px rgba(0,60,140,0.08);
    }
    .card-title{font-size:.62rem;font-weight:800;color:rgba(26,74,128,0.5);text-transform:uppercase;letter-spacing:1.5px;}
    .gender-row{display:flex;gap:8px;}
    .gender-btn{
      flex:1;font-family:'Fredoka One',cursive;font-size:1rem;
      border:none;border-radius:50px;padding:12px;cursor:pointer;transition:all .12s;
    }
    .gender-btn.man  {background:#4FC3F7;color:#003d66;box-shadow:0 4px 0 #0288D1;}
    .gender-btn.woman{background:#F48FB1;color:#880e4f;box-shadow:0 4px 0 #C2185B;}
    .gender-btn.active{transform:translateY(3px);filter:brightness(1.1);box-shadow:0 1px 0 rgba(0,0,0,0.15)!important;}
    .color-grid{display:flex;flex-wrap:wrap;gap:8px;}
    .color-dot{
      width:32px;height:32px;border-radius:50%;cursor:pointer;
      border:2.5px solid transparent;transition:all .13s;
      box-shadow:0 2px 6px rgba(0,0,0,0.18);
    }
    .color-dot:hover{transform:scale(1.18);}
    .color-dot.sel{border-color:#1a4a80;transform:scale(1.22);box-shadow:0 0 0 3px rgba(26,74,128,0.28);}
    .slider-wrap{display:flex;flex-direction:column;gap:4px;}
    .slider-wrap label{font-size:.62rem;font-weight:800;color:rgba(26,74,128,0.5);text-transform:uppercase;letter-spacing:1.2px;}
    input[type=range]{width:100%;accent-color:#1976D2;}
    .info-badge{
      font-size:.7rem;font-weight:700;color:rgba(26,74,128,0.5);
      background:rgba(255,255,255,0.4);border-radius:50px;
      padding:6px 16px;border:1.5px solid rgba(255,255,255,0.65);text-align:center;
    }
    #loading-overlay{
      position:absolute;inset:0;background:rgba(26,40,64,0.6);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;font-size:1rem;color:white;
      border-radius:21px;pointer-events:none;transition:opacity .2s;
    }
    #loading-overlay.hidden{opacity:0;}
    #preview-wrap{position:relative;}
  </style>
</head>
<body>

<h1>🎨 Mon Mii</h1>

<div id="preview-wrap">
  <canvas id="threeCanvas" height="360"></canvas>
  <div id="loading-overlay">⏳ Chargement...</div>
</div>

<div class="panel">

  <div class="card">
    <div class="card-title">Personnage</div>
    <div class="gender-row">
      <button class="gender-btn man active" id="btn-man"   onclick="setGender('man')">🧑 Homme</button>
      <button class="gender-btn woman"      id="btn-woman" onclick="setGender('woman')">👩 Femme</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Couleur de la tenue</div>
    <div class="color-grid" id="outfit-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Teinte de peau</div>
    <div class="color-grid" id="skin-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Taille</div>
    <div class="slider-wrap">
      <input type="range" id="scale-slider" min="0.5" max="2.8" step="0.1" value="1.4" oninput="updateScale(this.value)"/>
    </div>
  </div>

  <div class="info-badge" id="info-badge">—</div>
</div>

<canvas id="offscreen" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>
const SRC = {
  man:   'mii_man.png';
  woman: 'mii_woman.png'
  };

const OUTFIT_COLORS = [
  {hex:'#E84A20',label:'Orange original'},
  {hex:'#4FC3F7',label:'Bleu ciel'},
  {hex:'#1565C0',label:'Bleu marine'},
  {hex:'#43A047',label:'Vert'},
  {hex:'#E53935',label:'Rouge'},
  {hex:'#AB47BC',label:'Violet'},
  {hex:'#FF7043',label:'Corail'},
  {hex:'#FFD600',label:'Jaune'},
  {hex:'#00ACC1',label:'Cyan'},
  {hex:'#EC407A',label:'Rose'},
  {hex:'#6D4C41',label:'Marron'},
  {hex:'#546E7A',label:'Gris ardoise'},
  {hex:'#F5F5F5',label:'Blanc'},
  {hex:'#212121',label:'Noir'},
];

const SKIN_TONES = [
  {hex:'#F4DFC8',label:'Claire (original)'},
  {hex:'#FFE0BD',label:'Très claire'},
  {hex:'#F4A460',label:'Sable'},
  {hex:'#C8836A',label:'Caramel'},
  {hex:'#A0624A',label:'Bronze'},
  {hex:'#7D4B2A',label:'Foncée'},
];

// ── Three.js ──────────────────────────────────────────────────
const canvas   = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2840);

function resize() {
  const w = canvas.parentElement.clientWidth;
  renderer.setSize(w, 360);
  camera.aspect = w/360;
  camera.updateProjectionMatrix();
}
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
camera.position.set(0, 1.8, 5.2);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xaabbcc, 4.0));
const key = new THREE.DirectionalLight(0xfff5e0,3.0);
key.position.set(2,5,4); scene.add(key);
scene.add(new THREE.DirectionalLight(0x6699cc,1.5)).position.set(-3,3,2);

const sol = new THREE.Mesh(
  new THREE.CircleGeometry(5,32),
  new THREE.MeshPhongMaterial({color:0x2a3f5f,shininess:40})
);
sol.rotation.x = -Math.PI/2; scene.add(sol);

const shadowDisc = new THREE.Mesh(
  new THREE.CircleGeometry(0.42,24),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.20})
);
shadowDisc.rotation.x = -Math.PI/2;
shadowDisc.position.y = 0.01;
scene.add(shadowDisc);

// ── État ──────────────────────────────────────────────────────
let sprite = null, currentGender='man', currentOutfit=OUTFIT_COLORS[0].hex;
let currentSkin=SKIN_TONES[0].hex, currentScale=1.4, breathAngle=0;
const cache = {};

// ── Recolorisation pixel par pixel (HSV) ─────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function recolor(src, outfitHex, skinHex, cb) {
  const key = (src===SRC.man?'m':'w') + outfitHex + skinHex;
  if (cache[key]) { cb(cache[key]); return; }

  const img = new Image();
  img.onload = () => {
    const oc = document.getElementById('offscreen');
    oc.width=img.width; oc.height=img.height;
    const ctx = oc.getContext('2d');
    ctx.clearRect(0,0,oc.width,oc.height);
    ctx.drawImage(img,0,0);
    const id = ctx.getImageData(0,0,oc.width,oc.height);
    const d  = id.data;

    const [or,og,ob] = hexToRgb(outfitHex);
    const [sr,sg,sb] = hexToRgb(skinHex);

    // Couleurs source de référence mesurées
    // Peau source moyenne : ~R245 G215 B190  sat~0.22  (ton pêche)
    // Tenue source moyenne : ~R230 G90  B45   sat~0.80  (orange vif)
    const SRC_SKIN_R=245, SRC_SKIN_G=215, SRC_SKIN_B=190;
    const SRC_OUT_R =230, SRC_OUT_G =90,  SRC_OUT_B =45;

    for (let i=0;i<d.length;i+=4) {
      const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
      if (a<30) continue;

      // Saturation HSV
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
      const sat = mx>0 ? (mx-mn)/mx : 0;

      // ── TENUE : orange saturé, rouge domine, sat élevée ──
      const isOutfit = (r>160) && (g<r*0.56) && (b<r*0.42) && (sat>0.38) && (mx===r);

      // ── PEAU : ton chaud peu saturé, rouge domine légèrement ──
      const isSkin   = !isOutfit && (r>195) && (g>155) && (b>120)
                     && (sat>0.08) && (sat<0.42) && (mx===r) && (r-b<115);

      if (isOutfit) {
        // Préserve la luminosité relative (ombres/reflets)
        const lum = r / SRC_OUT_R;
        d[i]   = Math.min(255, Math.round(or * lum));
        d[i+1] = Math.min(255, Math.round(og * lum));
        d[i+2] = Math.min(255, Math.round(ob * lum));
      } else if (isSkin) {
        const lum = r / SRC_SKIN_R;
        d[i]   = Math.min(255, Math.round(sr * lum));
        d[i+1] = Math.min(255, Math.round(sg * lum));
        d[i+2] = Math.min(255, Math.round(sb * lum));
      }
    }

    ctx.putImageData(id,0,0);
    const url = oc.toDataURL('image/png');
    cache[key] = url;
    cb(url);
  };
  img.src = src;
}

function buildSprite(url) {
  if (sprite) { scene.remove(sprite); sprite.material.map.dispose(); sprite.material.dispose(); }
  const tex = new THREE.TextureLoader().load(url, () => {
    document.getElementById('loading-overlay').classList.add('hidden');
  });
  const mat = new THREE.SpriteMaterial({map:tex,transparent:true,alphaTest:0.05});
  sprite = new THREE.Sprite(mat);
  sprite.scale.set(currentScale, currentScale*1.6, 1);
  sprite.position.set(0, currentScale*0.82, 0);
  scene.add(sprite);
  updateBadge();
}

function refresh() {
  document.getElementById('loading-overlay').classList.remove('hidden');
  recolor(SRC[currentGender], currentOutfit, currentSkin, buildSprite);
}

function setGender(g) {
  currentGender=g;
  document.getElementById('btn-man').classList.toggle('active',g==='man');
  document.getElementById('btn-woman').classList.toggle('active',g==='woman');
  refresh();
}

function updateScale(v) {
  currentScale=parseFloat(v);
  if (sprite) { sprite.scale.set(currentScale,currentScale*1.6,1); sprite.position.y=currentScale*0.82; }
  updateBadge();
}

function updateBadge() {
  document.getElementById('info-badge').textContent =
    `scale(${currentScale.toFixed(1)}, ${(currentScale*1.6).toFixed(1)}, 1)  ·  tenue ${currentOutfit}  ·  peau ${currentSkin}`;
}

// ── Rendu ─────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  breathAngle+=0.016;
  if (sprite) sprite.position.y = currentScale*0.82 + Math.sin(breathAngle)*0.03;
  renderer.render(scene,camera);
})();

// ── Palettes ──────────────────────────────────────────────────
function makePalette(id, colors, onPick, defaultIdx=0) {
  const grid = document.getElementById(id);
  colors.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'color-dot'+(i===defaultIdx?' sel':'');
    d.style.background = c.hex;
    d.title = c.label;
    d.onclick = () => {
      onPick(c.hex);
      grid.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel');
    };
    grid.appendChild(d);
  });
}

makePalette('outfit-grid', OUTFIT_COLORS, hex=>{ currentOutfit=hex; refresh(); });
makePalette('skin-grid',   SKIN_TONES,   hex=>{ currentSkin=hex;   refresh(); });

refresh();
resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wii Sports Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Baloo 2', cursive;
      background: linear-gradient(160deg, #a8e4f7 0%, #6ec6f0 35%, #b8ecff 100%);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .wii-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.2) 0%, transparent 50%),
        linear-gradient(160deg, #a8e4f7 0%, #5bbde8 40%, #a0d8f0 100%);
      z-index: 0;
      pointer-events: none;
    }

    .bubble {
      position: fixed;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* ── Logo ── */
    .logo-area {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px 0;
    }
    .logo-left {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-weight: 700;
    }
    .logo-right { text-align: right; }
    .logo-wii-line {
      font-size: 1rem; font-weight: 800; color: #555; line-height: 1;
    }
    .logo-wii-line em { font-style: italic; color: #1a6aaa; }
    .logo-sports-line {
      font-size: 1.6rem; font-weight: 800; font-style: italic;
      color: #1a6aaa; line-height: 1; letter-spacing: -0.5px;
    }
    .logo-badge {
      display: inline-block; background: #2a82c4; color: white;
      font-size: 0.5rem; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;
    }

    /* ── Layout scrollable ── */
    .main-layout {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: 8px 12px 32px;
      gap: 8px;
      min-height: calc(100vh - 72px);
    }

    /* ── Preview ── */
    .preview-panel {
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(14px);
      border: 2px solid rgba(255,255,255,0.75);
      border-radius: 20px;
      height: 200px;
      overflow: hidden;
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.6), 0 4px 20px rgba(0,80,180,0.12);
      position: relative;
    }
    .preview-content {
      width: 100%; height: 100%;
      transition: opacity 0.15s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .preview-sport-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Sports list ── */
    .sports-list { display: flex; flex-direction: column; gap: 6px; }

    .sport-btn {
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(215,238,255,0.88) 100%);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 16px; padding: 0; cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 3px 0 rgba(140,195,235,0.7), 0 5px 14px rgba(0,60,140,0.1);
      transition: transform 0.1s, box-shadow 0.1s; outline: none;
    }
    .sport-btn::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: rgba(255,255,255,0.4); border-radius: 14px 14px 0 0; pointer-events: none;
    }
    .sport-btn.selected {
      background: linear-gradient(180deg, rgba(180,225,255,0.97) 0%, rgba(110,190,240,0.92) 100%);
      border-color: rgba(42,130,196,0.85);
      box-shadow: 0 3px 0 rgba(20,90,170,0.45), 0 0 0 3px rgba(42,130,196,0.22);
    }
    .sport-btn.selected .bracket-left,
    .sport-btn.selected .bracket-right { opacity: 1; }
    .bracket-left, .bracket-right {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 7px; height: 65%; border: 2.5px solid rgba(30,100,190,0.6);
      border-radius: 2px; opacity: 0; transition: opacity 0.2s;
    }
    .bracket-left  { left: 5px;  border-right: none; }
    .bracket-right { right: 5px; border-left: none; }
    .sport-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(140,195,235,0.7); }

    .sport-btn-inner { display: flex; align-items: center; gap: 12px; padding: 9px 18px 9px 14px; position: relative; z-index: 1; }
    .sport-btn-emoji { font-size: 1.7rem; flex-shrink: 0; filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.08)); }
    .sport-btn-info  { flex: 1; text-align: left; }
    .sport-btn-name  { font-size: 1.1rem; font-weight: 800; color: #1a4a80; line-height: 1.1; }
    .sport-btn.selected .sport-btn-name { color: #0d3060; }
    .sport-btn-detail { font-size: 0.68rem; color: #5a90c0; font-weight: 700; }
    .sport-btn-arrow  { font-size: 1.1rem; color: rgba(42,130,196,0.4); font-weight: 800; transition: transform 0.2s, color 0.2s; }
    .sport-btn.selected .sport-btn-arrow { color: #2a82c4; transform: translateX(3px); }

    /* ── Bouton jouer ── */
    .play-btn {
      width: 100%;
      background: linear-gradient(180deg, #55c0f5 0%, #2a82c4 50%, #1a65a8 100%);
      border: none; border-radius: 16px; padding: 14px; cursor: pointer;
      box-shadow: 0 5px 0 #0e4a8a, 0 8px 20px rgba(0,70,160,0.25);
      transition: transform 0.1s, box-shadow 0.1s; position: relative; overflow: hidden; outline: none;
    }
    .play-btn::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: rgba(255,255,255,0.22); border-radius: 16px 16px 0 0;
    }
    .play-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0e4a8a; }
    .play-btn-text { font-size: 1.15rem; font-weight: 800; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2); position: relative; z-index: 1; letter-spacing: 1px; }

    /* ── Loading ── */
    .loading-screen {
      display: none; position: fixed; inset: 0; z-index: 100;
      align-items: center; justify-content: center; flex-direction: column;
      background: linear-gradient(160deg, #a8e4f7 0%, #5bbde8 100%);
    }
    .loading-screen.active { display: flex; }
    .loading-card {
      background: rgba(255,255,255,0.5); backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.8); border-radius: 24px;
      padding: 28px 44px; text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .loading-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
    .loading-title { font-size: 1.8rem; font-weight: 800; color: #1a5fa0; }
    .loader-dots   { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
    .loader-dots span {
      width: 10px; height: 10px; background: #2a82c4; border-radius: 50%;
      animation: dotBounce 0.8s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes dotBounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-8px); opacity: 1; } }
  </style>
</head>
<body>

<div class="wii-bg"></div>

<div class="logo-area">
  <div class="logo-left" style="display:flex;flex-direction:column;gap:2px;">
    <span>Main Menu</span>
    <span id="user-greeting" style="font-size:0.7rem;color:rgba(255,255,255,0.5);font-weight:700;"></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo-right">
      <img src="assets/textures/logo_wiisport.png" alt="Wii Sports Mobile" style="height:46px;object-fit:contain;display:block;">
      <div class="logo-badge" style="text-align:center;margin-top:3px;">✦ Fan Made ✦</div>
    </div>
    <button id="muteBtn" onclick="toggleMute()" title="Musique"
      style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0;">
      🔊
    </button>
    <button onclick="seDeconnecter()" title="Se déconnecter"
      style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0;">
      🚪
    </button>
  </div>
</div>

<div class="main-layout">

  <div class="preview-panel">
    <div class="preview-content" id="previewContent">
      <img id="prevSportImg" src="assets/textures/bowling.png" alt="Bowling" class="preview-sport-img">
    </div>
  </div>

  <div class="sports-list">

    <button class="sport-btn selected" id="btn-bowling"
      onclick="selectionner('bowling')">
      <div class="bracket-left"></div><div class="bracket-right"></div>
      <div class="sport-btn-inner">
        <span class="sport-btn-emoji">🎳</span>
        <div class="sport-btn-info">
          <div class="sport-btn-name">Bowling</div>
          <div class="sport-btn-detail">10 frames · Gyroscope + Swipe</div>
        </div>
        <span class="sport-btn-arrow">›</span>
      </div>
    </button>

    <button class="sport-btn" id="btn-golf"
      onclick="selectionner('golf')">
      <div class="bracket-left"></div><div class="bracket-right"></div>
      <div class="sport-btn-inner">
        <span class="sport-btn-emoji">⛳</span>
        <div class="sport-btn-info">
          <div class="sport-btn-name">Golf</div>
          <div class="sport-btn-detail">3 trous · Gyroscope + Swipe</div>
        </div>
        <span class="sport-btn-arrow">›</span>
      </div>
    </button>

    <button class="sport-btn" id="btn-tennis"
      onclick="selectionner('tennis')">
      <div class="bracket-left"></div><div class="bracket-right"></div>
      <div class="sport-btn-inner">
        <span class="sport-btn-emoji">🎾</span>
        <div class="sport-btn-info">
          <div class="sport-btn-name">Tennis</div>
          <div class="sport-btn-detail">1 set · 2 vs 2</div>
        </div>
        <span class="sport-btn-arrow">›</span>
      </div>
    </button>

    <button class="sport-btn" id="btn-boxe"
      onclick="selectionner('boxe')">
      <div class="bracket-left"></div><div class="bracket-right"></div>
      <div class="sport-btn-inner">
        <span class="sport-btn-emoji">🥊</span>
        <div class="sport-btn-info">
          <div class="sport-btn-name">Boxe</div>
          <div class="sport-btn-detail">3 rounds · Swipe </div>
        </div>
        <span class="sport-btn-arrow">›</span>
      </div>
    </button>

    <button class="sport-btn" id="btn-baseball"
      onclick="selectionner('baseball')">
      <div class="bracket-left"></div><div class="bracket-right"></div>
      <div class="sport-btn-inner">
        <span class="sport-btn-emoji">⚾️</span>
        <div class="sport-btn-info">
          <div class="sport-btn-name">Baseball</div>
          <div class="sport-btn-detail">3 rounds · Reflexe </div>
        </div>
        <span class="sport-btn-arrow">›</span>
      </div>
    </button>
  </div>

  <button class="play-btn" onclick="lancerJeu()">
    <div class="play-btn-text">▶&nbsp; Jouer !</div>
  </button>

  <div style="display: flex; gap: 10px; width: 100%;">
    <button onclick="window.location.href='profil.html'"
      style="flex: 1; background:rgba(255,255,255,0.45);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.8);border-radius:16px;padding:12px;cursor:pointer;box-shadow:0 3px 0 rgba(140,195,235,0.6),0 5px 14px rgba(0,60,140,0.08);transition:transform .1s,box-shadow .1s;outline:none;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;color:#1a5fa0;"
      onmousedown="this.style.transform='translateY(3px)';this.style.boxShadow='0 0 0 rgba(140,195,235,0.6)'"
      onmouseup="this.style.transform='';this.style.boxShadow=''"
      ontouchstart="this.style.transform='translateY(3px)'"
      ontouchend="this.style.transform=''">
      👤&nbsp; Profil
    </button>

    <button onclick="window.location.href='classements.html'"
      style="flex: 1; background:rgba(255,255,255,0.45);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.8);border-radius:16px;padding:12px;cursor:pointer;box-shadow:0 3px 0 rgba(140,195,235,0.6),0 5px 14px rgba(0,60,140,0.08);transition:transform .1s,box-shadow .1s;outline:none;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;color:#1a5fa0;"
      onmousedown="this.style.transform='translateY(3px)';this.style.boxShadow='0 0 0 rgba(140,195,235,0.6)'"
      onmouseup="this.style.transform='';this.style.boxShadow=''"
      ontouchstart="this.style.transform='translateY(3px)'"
      ontouchend="this.style.transform=''">
      🏆&nbsp; Classements
    </button>
  </div>

</div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-card">
    <span class="loading-emoji" id="loadingEmoji">🎳</span>
    <div class="loading-title" id="loadingTitle">Bowling</div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Musique de fond -->
<audio id="bgMusic" loop preload="auto">
  <source src="assets/sounds/WII_sport.mp3" type="audio/mpeg">
</audio>

<!-- Supabase CDN — doit être AVANT supabase.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=3"></script>

<script>
  // ── Musique de fond ──
  const bgMusic = document.getElementById('bgMusic');
  bgMusic.volume = 0.5;
  let musicStarted = false;
  let muted = false;

  function lancerMusique() {
    if (musicStarted) return;
    bgMusic.play().then(() => {
      musicStarted = true;
      document.getElementById('muteBtn').textContent = '🔊';
    }).catch(() => {});
  }

  function toggleMute() {
    if (!musicStarted) {
      // Premier clic sur 🔊 : forcer le démarrage
      bgMusic.play().then(() => {
        musicStarted = true;
        muted = false;
        document.getElementById('muteBtn').textContent = '🔊';
      });
      return;
    }
    muted = !muted;
    bgMusic.muted = muted;
    document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  }

  // Tenter autoplay + démarrer sur n'importe quelle interaction
  lancerMusique();
  document.addEventListener('touchstart', lancerMusique);
  document.addEventListener('click', lancerMusique);

  // ── Bulles déco ──
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = 20 + Math.random() * 60;
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*6}s;`;
    document.body.appendChild(b);
  }

  // ── Garde auth : redirige si non connecté, affiche le prénom sinon ──
  (async () => {
    const session = await checkAuth();
    if (!session) return; // checkAuth redirige vers login.html tout seul
    const profil = await getProfilCourant();
    if (profil) {
      const prenom = profil.full_name.split(' ')[0];
      document.getElementById('user-greeting').textContent = `👋 ${prenom}`;
    }
  })();

  // ── Menu sports ──
  let sportActuel = 'bowling';
  const infos = {
    bowling: { emoji:'🎳', nom:'Bowling', desc:'Renverse toutes les quilles !', t1:'10 Frames',  t2:'2 lancers / frame', t3:'📐 Gyroscope' },
    golf:    { emoji:'⛳', nom:'Golf',    desc:'Mets la balle dans le trou !',  t1:'3 Trous',   t2:'Par / Score',       t3:'📐 Gyroscope' },
    tennis:  { emoji:'🎾', nom:'Tennis',  desc:'Gagne le sets !',            t1:'1 Set',    t2:'15·30·40·Jeu',      t3:'📐 Gyroscope' },
    boxe:    { emoji:'🥊', nom:'Boxe',    desc:'Entraine tes reflexes !', t1:'3 Rounds',  t2:'Barre de vie'     },
    baseball: { emoji:'⚾️', nom:'Baseball', desc:'Sois précis dans le timing !', t1:'5 Rounds', t2:'Barre de vie' },
  };

  function selectionner(sport) {
    sportActuel = sport;
    document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`btn-${sport}`).classList.add('selected');
    const c = document.getElementById('previewContent');
    c.style.opacity = '0'; c.style.transform = 'scale(0.92)';
    setTimeout(() => {
      document.getElementById('prevSportImg').src = `assets/textures/${sport}.png`;
      document.getElementById('prevSportImg').alt = sport;
      c.style.transition = 'all 0.28s cubic-bezier(0.34,1.56,0.64,1)';
      c.style.opacity = '1'; c.style.transform = 'scale(1)';
    }, 140);
    if (navigator.vibrate) navigator.vibrate(20);
    setTimeout(() => document.querySelector('.play-btn').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200);
  }

  function lancerJeu() {
    const s = infos[sportActuel];
    document.getElementById('loadingEmoji').textContent = s.emoji;
    document.getElementById('loadingTitle').textContent = s.nom;
    document.getElementById('loadingScreen').classList.add('active');
    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    setTimeout(() => { window.location.href = `scenes/${sportActuel}.html`; }, 1600);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎾 Tennis — Wii Sports Mobile</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; overflow:hidden; font-family:'Segoe UI',sans-serif; touch-action:none; }
canvas { display:block; }
#ui-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10;
}
#score-board {
  position:fixed; top:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; align-items:center;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(8px);
  border-radius:50px; padding:8px 20px;
  border:2px solid rgba(255,255,255,0.15);
  pointer-events:none; z-index:20;
}
.team-score {
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.team-name { font-size:11px; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:1px; }
.score-val {
  font-size:26px; font-weight:900; color:#fff;
  text-shadow:0 0 10px currentColor;
  transition:transform 0.2s;
}
.score-val.bump { transform:scale(1.5); color:#FFE500; }
.score-divider { font-size:20px; color:rgba(255,255,255,0.4); padding:0 5px; }
.tennis-pts {
  font-size:13px; font-weight:700; padding:2px 10px;
  border-radius:20px; background:rgba(255,255,255,0.1);
  color:#fff;
}
#game-label {
  position:fixed; top:68px; left:50%; transform:translateX(-50%);
  font-size:12px; color:rgba(255,255,255,0.6);
  background:rgba(0,0,0,0.4); padding:4px 12px; border-radius:20px;
  pointer-events:none; z-index:20;
}
#tilt-indicator {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px;
  background:rgba(0,0,0,0.5); border-radius:30px; padding:8px 16px;
  pointer-events:none; z-index:20;
}
.tilt-bar-bg {
  width:120px; height:8px; background:rgba(255,255,255,0.15);
  border-radius:4px; overflow:hidden; position:relative;
}
.tilt-bar-fill {
  height:100%; width:50%; background:linear-gradient(90deg,#4FC3F7,#fff,#FF7043);
  border-radius:4px; transform:translateX(-50%); transition:transform 0.1s;
  position:absolute; left:0;
}
.tilt-label { font-size:11px; color:rgba(255,255,255,0.6); }
#result-overlay {
  position:fixed; inset:0; display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:50;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(10px);
}
#result-overlay.show { display:flex; }
.result-box {
  background:linear-gradient(135deg,#1565C0,#0D47A1);
  border:3px solid rgba(255,255,255,0.3); border-radius:24px;
  padding:40px 50px; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(21,101,192,0.5);
  animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.result-emoji { font-size:60px; margin-bottom:10px; }
.result-title { font-size:32px; font-weight:900; color:#fff; margin-bottom:6px; }
.result-sub { font-size:16px; color:rgba(255,255,255,0.7); margin-bottom:24px; }
.result-btn {
  background:linear-gradient(135deg,#FFE500,#FF9800);
  color:#000; font-weight:900; font-size:18px;
  border:none; border-radius:50px; padding:14px 36px;
  cursor:pointer; pointer-events:all;
  box-shadow:0 4px 20px rgba(255,229,0,0.4);
  transition:transform 0.15s;
}
.result-btn:active { transform:scale(0.95); }
#start-screen {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:100;
  background:linear-gradient(160deg,#1a237e 0%,#0d47a1 40%,#006064 100%);
}
.start-title { font-size:48px; font-weight:900; color:#fff; text-shadow:0 4px 20px rgba(0,0,0,0.4); margin-bottom:8px; }
.start-sub { font-size:16px; color:rgba(255,255,255,0.7); margin-bottom:40px; }
.diff-grid { display:flex; gap:16px; margin-bottom:30px; flex-wrap:wrap; justify-content:center; }
.diff-btn {
  padding:16px 28px; border-radius:20px; border:3px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1); color:#fff; font-size:17px; font-weight:700;
  cursor:pointer; transition:all 0.2s; min-width:110px; text-align:center;
}
.diff-btn:hover, .diff-btn.selected {
  background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.7);
  transform:scale(1.05);
}
.diff-btn.selected { background:rgba(255,229,0,0.3); border-color:#FFE500; color:#FFE500; }
.start-btn {
  background:linear-gradient(135deg,#FFE500,#FF9800);
  color:#000; font-weight:900; font-size:20px;
  border:none; border-radius:50px; padding:16px 44px;
  cursor:pointer; box-shadow:0 4px 24px rgba(255,229,0,0.5);
  transition:transform 0.15s; display:none;
}
.start-btn.visible { display:block; }
.start-btn:active { transform:scale(0.95); }
#point-flash {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:48px; font-weight:900; color:#FFE500;
  text-shadow:0 0 30px rgba(255,229,0,0.8);
  pointer-events:none; z-index:40; opacity:0;
  transition:opacity 0.2s;
}
#point-flash.show { opacity:1; }
</style>
</head>
<body>

<div id="start-screen">
  <div style="font-size:72px;margin-bottom:10px;">🎾</div>
  <div class="start-title">Tennis</div>
  <div class="start-sub">2 contre 2 · Penche ton téléphone pour viser !</div>
  <div class="diff-grid">
    <div class="diff-btn" onclick="choisirDiff('facile',this)">😊 Facile</div>
    <div class="diff-btn" onclick="choisirDiff('moyen',this)">😤 Moyen</div>
    <div class="diff-btn" onclick="choisirDiff('difficile',this)">💀 Difficile</div>
  </div>
  <button class="start-btn" id="startBtn" onclick="demarrer()">C'est parti ! 🎾</button>
</div>

<div id="score-board">
  <div class="team-score">
    <div class="team-name">🔵 Toi</div>
    <div class="score-val" id="score-joueur">0</div>
    <div class="tennis-pts" id="pts-joueur">0</div>
  </div>
  <div class="score-divider">VS</div>
  <div class="team-score">
    <div class="tennis-pts" id="pts-adv">0</div>
    <div class="score-val" id="score-adv">0</div>
    <div class="team-name">🔴 CPU</div>
  </div>
</div>
<div id="game-label">Set 1 · Jeu en cours</div>

<div id="tilt-indicator">
  <span class="tilt-label">◀ Gauche</span>
  <div class="tilt-bar-bg"><div class="tilt-bar-fill" id="tiltFill"></div></div>
  <span class="tilt-label">Droite ▶</span>
</div>

<div id="point-flash"></div>

<div id="result-overlay">
  <div class="result-box">
    <div class="result-emoji" id="res-emoji">🏆</div>
    <div class="result-title" id="res-title">Victoire !</div>
    <div class="result-sub" id="res-sub">Tu as gagné le match !</div>
    <button class="result-btn" onclick="resetJeu()">Rejouer 🎾</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
//  ÉTAT DU JEU
// ══════════════════════════════════════════
const TENNIS_PTS = ['0','15','30','40','Ad'];
let etat = {
  difficulte: null,
  ptsJoueur: 0, ptsAdv: 0,
  jeuxJoueur: 0, jeuxAdv: 0,
  balle: { x:0, y:1.2, z:0, vx:0, vy:0, vz:0, enVol:false, direction:1 },
  joueurTilt: 0, // -1 à 1
  phase: 'service', // 'service','echange','point'
  animSpec: null,
  temps: 0,
};

// ══════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, 0);

// Lumières
const sunLight = new THREE.DirectionalLight(0xFFF5E0, 1.4);
sunLight.position.set(10, 20, 10);
sunLight.castShadow = true;
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xB0C8E0, 0.7));
const fillLight = new THREE.DirectionalLight(0x90CAF9, 0.4);
fillLight.position.set(-8, 5, -5);
scene.add(fillLight);

// ══════════════════════════════════════════
//  COURT DE TENNIS
// ══════════════════════════════════════════
function creerCourt() {
  // Sol herbe
  const herbeGeo = new THREE.PlaneGeometry(60, 60);
  const herbeMat = new THREE.MeshPhongMaterial({ color:0x2E7D32, shininess:20 });
  const herbe = new THREE.Mesh(herbeGeo, herbeMat);
  herbe.rotation.x = -Math.PI/2;
  herbe.receiveShadow = true;
  scene.add(herbe);

  // Court (surface bleue)
  const courtGeo = new THREE.PlaneGeometry(10.97, 23.77);
  const courtMat = new THREE.MeshPhongMaterial({ color:0x1565C0, shininess:40 });
  const court = new THREE.Mesh(courtGeo, courtMat);
  court.rotation.x = -Math.PI/2;
  court.position.y = 0.01;
  court.receiveShadow = true;
  scene.add(court);

  // Lignes blanches
  function ligne(w,h,x,z) {
    const geo = new THREE.PlaneGeometry(w,h);
    const mat = new THREE.MeshPhongMaterial({ color:0xFFFFFF, shininess:60 });
    const m = new THREE.Mesh(geo,mat);
    m.rotation.x = -Math.PI/2;
    m.position.set(x,0.02,z);
    scene.add(m);
  }
  // Contours
  ligne(10.97,0.05,0,-11.885); ligne(10.97,0.05,0,11.885);
  ligne(0.05,23.77,-5.485,0); ligne(0.05,23.77,5.485,0);
  // Ligne de service
  ligne(10.97,0.05,0,-6.4); ligne(10.97,0.05,0,6.4);
  // Couloir double (si double)
  ligne(0.05,23.77,-4.115,0); ligne(0.05,23.77,4.115,0);
  // Ligne centrale
  ligne(0.05,12.8,0,0);

  // Filet
  const filetGeo = new THREE.BoxGeometry(10.97,0.91,0.05);
  const filetMat = new THREE.MeshPhongMaterial({ color:0xFFFFFF, transparent:true, opacity:0.7, shininess:80 });
  const filet = new THREE.Mesh(filetGeo,filetMat);
  filet.position.set(0,0.455,0);
  scene.add(filet);
  // Poteaux
  [-5.485,5.485].forEach(x => {
    const pGeo = new THREE.CylinderGeometry(0.05,0.05,1.2);
    const pMat = new THREE.MeshPhongMaterial({ color:0xCCCCCC, shininess:100 });
    const p = new THREE.Mesh(pGeo,pMat);
    p.position.set(x,0.6,0);
    scene.add(p);
  });

  // Gradins (rectangles colorés)
  const couleursGradin = [0xE53935,0x1E88E5,0x43A047,0xFB8C00,0x8E24AA];
  [-14,-13.5,-13].forEach((z,i) => {
    const grad = new THREE.BoxGeometry(28,1.2+i*0.3,0.3);
    const gmat = new THREE.MeshPhongMaterial({ color:couleursGradin[i%5], shininess:30 });
    const g = new THREE.Mesh(grad,gmat);
    g.position.set(0,0.6+i*0.8,z);
    scene.add(g);
  });
  [14,13.5,13].forEach((z,i) => {
    const grad = new THREE.BoxGeometry(28,1.2+i*0.3,0.3);
    const gmat = new THREE.MeshPhongMaterial({ color:couleursGradin[(i+2)%5], shininess:30 });
    const g = new THREE.Mesh(grad,gmat);
    g.position.set(0,0.6+i*0.8,z);
    scene.add(g);
  });
}
creerCourt();

// ══════════════════════════════════════════
//  CRÉER UN MII
// ══════════════════════════════════════════
function creerMii(couleurCorps, couleurPeau, x, z, rot) {
  const groupe = new THREE.Group();
  const peau = new THREE.MeshPhongMaterial({ color:couleurPeau, shininess:80 });
  const corps = new THREE.MeshPhongMaterial({ color:couleurCorps, shininess:60 });

  // Corps
  const bodyGeo = new THREE.CylinderGeometry(0.28,0.22,0.7);
  groupe.add(objet(bodyGeo,corps,0,0.55,0));
  // Tête
  const headGeo = new THREE.SphereGeometry(0.28,16,12);
  groupe.add(objet(headGeo,peau,0,1.18,0));
  // Yeux
  [-0.1,0.1].forEach(ex => {
    const eGeo = new THREE.SphereGeometry(0.06,8,8);
    const eMat = new THREE.MeshPhongMaterial({ color:0x222222, shininess:120 });
    groupe.add(objet(eGeo,eMat,ex,1.22,0.24));
    // Reflet
    const rGeo = new THREE.SphereGeometry(0.025,6,6);
    const rMat = new THREE.MeshPhongMaterial({ color:0xFFFFFF });
    groupe.add(objet(rGeo,rMat,ex+0.02,1.24,0.27));
  });
  // Bouche
  const bGeo = new THREE.SphereGeometry(0.05,8,8);
  groupe.add(objet(bGeo,new THREE.MeshPhongMaterial({color:0xCC4444,shininess:60}),0,1.08,0.25));
  // Jambes
  [-0.12,0.12].forEach(jx => {
    const jGeo = new THREE.CylinderGeometry(0.1,0.1,0.5);
    groupe.add(objet(jGeo,corps,jx,0.1,0));
  });
  // Bras
  [-0.38,0.38].forEach((bx,i) => {
    const bGeo = new THREE.CylinderGeometry(0.07,0.07,0.4);
    const bras = objet(bGeo,peau,bx,0.65+0.05,0);
    bras.rotation.z = i===0 ? 0.5 : -0.5;
    groupe.add(bras);
  });

  groupe.position.set(x,0,z);
  groupe.rotation.y = rot;
  groupe.castShadow = true;
  scene.add(groupe);
  return groupe;
}

function objet(geo,mat,x,y,z) {
  const m = new THREE.Mesh(geo,mat);
  m.position.set(x,y,z);
  m.castShadow = true;
  return m;
}

// ══════════════════════════════════════════
//  JOUEURS ET ADVERSAIRES
// ══════════════════════════════════════════
// Équipe bleue (joueur) : z positif
const miiJ1 = creerMii(0x1565C0, 0xFFCBA4, -2, 8, 0);
const miiJ2 = creerMii(0x0288D1, 0xFFCBA4, 2, 9, 0);
// Équipe rouge (CPU) : z négatif
const miiA1 = creerMii(0xC62828, 0xFFCBA4, -2, -8, Math.PI);
const miiA2 = creerMii(0xE53935, 0xFFCBA4, 2, -9, Math.PI);

// Raquettes
function creerRaquette(couleur) {
  const g = new THREE.Group();
  // Tête ovale
  const headGeo = new THREE.TorusGeometry(0.25,0.04,8,20);
  g.add(objet(headGeo, new THREE.MeshPhongMaterial({color:couleur,shininess:100}),0,0.25,0));
  // Manche
  const manGeo = new THREE.CylinderGeometry(0.03,0.04,0.5);
  g.add(objet(manGeo, new THREE.MeshPhongMaterial({color:0x795548,shininess:60}),0,-0.1,0));
  // Cordage
  const cordGeo = new THREE.PlaneGeometry(0.46,0.46);
  g.add(objet(cordGeo, new THREE.MeshPhongMaterial({color:0xE0E0E0,transparent:true,opacity:0.5,side:THREE.DoubleSide}),0,0.25,0));
  return g;
}

const raqJ1 = creerRaquette(0x1565C0);
miiJ1.add(raqJ1);
raqJ1.position.set(0.45,0.65,0);
raqJ1.rotation.z = -0.3;

const raqA1 = creerRaquette(0xC62828);
miiA1.add(raqA1);
raqA1.position.set(0.45,0.65,0);
raqA1.rotation.z = -0.3;

// ══════════════════════════════════════════
//  BALLE DE TENNIS
// ══════════════════════════════════════════
const balleGeo = new THREE.SphereGeometry(0.065,16,12);
const balleMat = new THREE.MeshPhongMaterial({ color:0xCDDC39, shininess:80 });
const balleMesh = new THREE.Mesh(balleGeo,balleMat);
balleMesh.castShadow = true;
scene.add(balleMesh);

// Ombre de la balle
const ombreGeo = new THREE.CircleGeometry(0.1,16);
const ombreMat = new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.3 });
const ombreMesh = new THREE.Mesh(ombreGeo,ombreMat);
ombreMesh.rotation.x = -Math.PI/2;
ombreMesh.position.y = 0.02;
scene.add(ombreMesh);

// ══════════════════════════════════════════
//  SPECTATEURS MII
// ══════════════════════════════════════════
const COULEURS_SPEC = [0xFF5722,0x9C27B0,0x009688,0xFF9800,0x4CAF50,0xE91E63,0x00BCD4,0xCDDC39];
let spectateursMiis = [];
for(let i=0; i<20; i++) {
  const angle = (i/20) * Math.PI * 2;
  const r = 10 + Math.random()*3;
  const cx = Math.cos(angle)*r;
  const cz = Math.sin(angle)*r;
  const s = creerMii(COULEURS_SPEC[i%8], 0xFFCBA4, cx, cz, Math.atan2(-cz,-cx));
  s.scale.setScalar(0.7);
  spectateursMiis.push(s);
}

// ══════════════════════════════════════════
//  GYROSCOPE
// ══════════════════════════════════════════
let tiltX = 0;
if (window.DeviceOrientationEvent) {
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — demande sur action
  } else {
    window.addEventListener('deviceorientation', e => {
      tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
    });
  }
}

// ══════════════════════════════════════════
//  LOGIQUE DE JEU
// ══════════════════════════════════════════
let difficulte = 'moyen';
let jeuActif = false;

const DIFF = {
  facile:    { vitesse:0.12, erreurIA:0.7, delaiIA:60 },
  moyen:     { vitesse:0.16, erreurIA:0.4, delaiIA:40 },
  difficile: { vitesse:0.20, erreurIA:0.15, delaiIA:20 },
};

function choisirDiff(d, btn) {
  difficulte = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('startBtn').classList.add('visible');
}

function demarrer() {
  document.getElementById('start-screen').style.display='none';
  jeuActif = true;
  etat.jeuxJoueur = 0; etat.jeuxAdv = 0;
  etat.ptsJoueur = 0; etat.ptsAdv = 0;
  serviceJoueur();

  // Demander permission iOS
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') {
        window.addEventListener('deviceorientation', e => {
          tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
        });
      }
    });
  }
}

function serviceJoueur() {
  etat.balle.x = 0; etat.balle.y = 2; etat.balle.z = 6;
  etat.balle.vx = 0; etat.balle.vy = 0; etat.balle.vz = 0;
  etat.balle.enVol = false;
  etat.phase = 'service';
  balleMesh.position.set(0,2,6);
  setTimeout(() => lancerService(), 1200);
}

function lancerService() {
  if (!jeuActif) return;
  const d = DIFF[difficulte];
  const angle = tiltX * 0.5;
  etat.balle.vx = angle * d.vitesse * 5;
  etat.balle.vz = -d.vitesse * 8;
  etat.balle.vy = 0.05;
  etat.balle.enVol = true;
  etat.balle.direction = -1; // vers adversaire
  etat.phase = 'echange';
  // Animation bras J1
  animerFrappe(miiJ1, raqJ1);
}

function animerFrappe(mii, raq) {
  let t = 0;
  function step() {
    t++;
    raq.rotation.z = -0.3 - Math.sin(t*0.3)*0.8;
    if (t < 20) requestAnimationFrame(step);
    else raq.rotation.z = -0.3;
  }
  requestAnimationFrame(step);
}

// Timer pour retour IA
let iaTimer = 0;

function updateBalle() {
  if (!etat.balle.enVol) return;
  const b = etat.balle;
  const d = DIFF[difficulte];

  b.x += b.vx;
  b.z += b.vz;
  b.y += b.vy;
  b.vy -= 0.008; // gravité

  // Rebond au sol
  if (b.y < 0.065) {
    b.y = 0.065;
    b.vy = Math.abs(b.vy) * 0.7;
    if (Math.abs(b.vy) < 0.02) b.vy = 0.02;
  }

  // Limites gauche/droite
  if (Math.abs(b.x) > 5.5) {
    b.vx *= -0.7;
    b.x = Math.sign(b.x) * 5.5;
  }

  // IA retourne la balle quand elle arrive côté adverse
  if (b.z < -7 && b.direction === -1) {
    iaTimer++;
    if (iaTimer > d.delaiIA) {
      iaTimer = 0;
      if (Math.random() > d.erreurIA) {
        // Retour IA
        const cibleX = tiltX * 3 + (Math.random()-0.5)*2;
        b.vx = (cibleX - b.x) * 0.04;
        b.vz = d.vitesse * 8;
        b.vy = 0.06;
        b.direction = 1;
        animerFrappe(miiA1, raqA1);
      } else {
        // Faute IA
        b.vz = -0.3; b.vx = (Math.random()-0.5)*0.2;
        b.direction = 0;
      }
    }
  }

  // Joueur retourne quand balle arrive côté joueur
  if (b.z > 6 && b.direction === 1) {
    const d2 = DIFF[difficulte];
    const angle = tiltX * 0.6;
    b.vx = angle * d2.vitesse * 6;
    b.vz = -d2.vitesse * 9;
    b.vy = 0.05;
    b.direction = -1;
    animerFrappe(miiJ1, raqJ1);
  }

  // Balle sort (fond du terrain)
  if (b.z > 13) {
    // Faute joueur
    pointAdversaire(); return;
  }
  if (b.z < -13) {
    // Faute IA (ou bonne frappe joueur)
    pointJoueur(); return;
  }

  // Balle dans le filet (y très bas au milieu)
  if (Math.abs(b.z) < 0.3 && b.y < 0.91) {
    if (b.direction === -1) pointAdversaire();
    else pointJoueur();
    return;
  }

  balleMesh.position.set(b.x, b.y, b.z);
  ombreMesh.position.set(b.x, 0.02, b.z);
  ombreMesh.scale.setScalar(Math.max(0.3, 1 - b.y*0.2));
}

function afficherFlash(msg, couleur) {
  const f = document.getElementById('point-flash');
  f.textContent = msg;
  f.style.color = couleur || '#FFE500';
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 800);
}

function pointJoueur() {
  etat.balle.enVol = false;
  etat.ptsJoueur++;
  mettreAJourScore();
  afficherFlash('Point ! 🎾', '#4FC3F7');
  animerJoie([miiJ1,miiJ2]);
  animerTristesse([miiA1,miiA2]);
  animerSpec('joie');
  setTimeout(()=>{ if(jeuActif) serviceJoueur(); }, 2000);
}

function pointAdversaire() {
  etat.balle.enVol = false;
  etat.ptsAdv++;
  mettreAJourScore();
  afficherFlash('Raté ! 😬', '#FF7043');
  animerTristesse([miiJ1,miiJ2]);
  animerJoie([miiA1,miiA2]);
  setTimeout(()=>{ if(jeuActif) serviceJoueur(); }, 2000);
}

function mettreAJourScore() {
  // Points tennis : 0 15 30 40 Avantage
  const pj = etat.ptsJoueur, pa = etat.ptsAdv;
  let labelJ, labelA;
  if (pj >= 3 && pa >= 3) {
    if (pj === pa) { labelJ = labelA = '40'; }
    else if (pj > pa) { labelJ = 'Ad'; labelA = '40'; }
    else { labelJ = '40'; labelA = 'Ad'; }
  } else {
    const pts = ['0','15','30','40'];
    labelJ = pts[Math.min(pj,3)];
    labelA = pts[Math.min(pa,3)];
  }
  document.getElementById('pts-joueur').textContent = labelJ;
  document.getElementById('pts-adv').textContent = labelA;

  // Vérifier fin de jeu
  if ((pj >= 4 && pj - pa >= 2) || (pa >= 4 && pa - pj >= 2)) {
    if (pj > pa) { etat.jeuxJoueur++; etat.ptsJoueur=0; etat.ptsAdv=0; }
    else { etat.jeuxAdv++; etat.ptsJoueur=0; etat.ptsAdv=0; }
    const sj = document.getElementById('score-joueur');
    const sa = document.getElementById('score-adv');
    sj.textContent = etat.jeuxJoueur;
    sa.textContent = etat.jeuxAdv;
    sj.classList.add('bump');
    sa.classList.add('bump');
    setTimeout(()=>{sj.classList.remove('bump');sa.classList.remove('bump');},400);

    if (etat.jeuxJoueur >= 6 || etat.jeuxAdv >= 6) {
      setTimeout(finDeMatch, 500);
    }
  } else {
    document.getElementById('score-joueur').textContent = etat.jeuxJoueur;
    document.getElementById('score-adv').textContent = etat.jeuxAdv;
  }
}

function finDeMatch() {
  jeuActif = false;
  const victoire = etat.jeuxJoueur > etat.jeuxAdv;
  document.getElementById('res-emoji').textContent = victoire ? '🏆' : '😢';
  document.getElementById('res-title').textContent = victoire ? 'Victoire !' : 'Défaite...';
  document.getElementById('res-sub').textContent = victoire
    ? `${etat.jeuxJoueur} - ${etat.jeuxAdv} · Tu as dominé le match !`
    : `${etat.jeuxJoueur} - ${etat.jeuxAdv} · Essaie encore !`;
  document.getElementById('result-overlay').classList.add('show');
  if (victoire) animerSpec('joieForte');
}

function resetJeu() {
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('start-screen').style.display='flex';
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('startBtn').classList.remove('visible');
  etat.jeuxJoueur=0; etat.jeuxAdv=0;
  etat.ptsJoueur=0; etat.ptsAdv=0;
  mettreAJourScore();
}

// ══════════════════════════════════════════
//  ANIMATIONS MIIS
// ══════════════════════════════════════════
function animerJoie(miis) {
  let t=0;
  function step() {
    t++;
    miis.forEach(m => { m.position.y = Math.abs(Math.sin(t*0.4))*0.4; });
    if (t<40) requestAnimationFrame(step);
    else miis.forEach(m=>m.position.y=0);
  }
  requestAnimationFrame(step);
}

function animerTristesse(miis) {
  let t=0;
  function step() {
    t++;
    miis.forEach(m => { m.rotation.z = Math.sin(t*0.3)*0.1; });
    if (t<30) requestAnimationFrame(step);
    else miis.forEach(m=>m.rotation.z=0);
  }
  requestAnimationFrame(step);
}

function animerSpec(type) {
  const t0 = Date.now();
  etat.animSpec = { type, fin: t0 + (type==='joieForte'?3000:1500) };
}

// ══════════════════════════════════════════
//  BOUCLE PRINCIPALE
// ══════════════════════════════════════════
let dernierTps = 0;
function animate(tps) {
  requestAnimationFrame(animate);
  const dt = tps - dernierTps;
  dernierTps = tps;
  etat.temps = tps;

  if (jeuActif) {
    updateBalle();
    // Mise à jour tilt indicator
    const fill = document.getElementById('tiltFill');
    const pct = (tiltX + 1) / 2 * 100;
    fill.style.transform = `translateX(${pct-50}%)`;
    etat.joueurTilt = tiltX;
  }

  // Animations spectateurs
  if (etat.animSpec && Date.now() < etat.animSpec.fin) {
    const phase = tps * 0.01;
    spectateursMiis.forEach((s,i) => {
      if (etat.animSpec.type === 'joie' || etat.animSpec.type === 'joieForte') {
        s.position.y = Math.abs(Math.sin(phase + i*0.5)) * 0.3;
      } else {
        s.rotation.z = Math.sin(phase*2 + i*0.4) * 0.2;
      }
    });
  } else if (etat.animSpec && Date.now() >= etat.animSpec.fin) {
    spectateursMiis.forEach(s=>{ s.position.y=0; s.rotation.z=0; });
    etat.animSpec = null;
  }

  // Rotation légère raquettes
  raqJ1.rotation.y = Math.sin(tps*0.001)*0.1;
  raqA1.rotation.y = Math.sin(tps*0.001+1)*0.1;

  renderer.render(scene, camera);
}
animate(0);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎾 Tennis — Wii Sports Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a2e1a;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  touch-action:none;
}
canvas { display:block; }

/* ── SCORE BOARD ── */
#score-board {
  position:fixed; top:6px; left:50%; transform:translateX(-50%);
  display:flex; gap:0; align-items:stretch;
  pointer-events:none; z-index:20;
}
.team-score {
  display:flex; flex-direction:column; align-items:center; gap:0px;
  background:rgba(0,0,0,0.60); backdrop-filter:blur(10px);
  padding:3px 8px;
  border:1px solid rgba(255,255,255,0.12);
}
.team-score.left  { border-radius:8px 0 0 8px; }
.team-score.right { border-radius:0 8px 8px 0; }
.team-name {
  font-size:8px; color:rgba(255,255,255,0.5);
  text-transform:uppercase; letter-spacing:0.5px; font-weight:800;
}
.score-val {
  font-family:'Fredoka One',cursive;
  font-size:16px; color:#fff; line-height:1;
  transition:transform 0.2s, color 0.2s;
}
.score-val.bump { transform:scale(1.4); color:#FFE500; }
.score-divider {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.75); padding:3px 6px;
  border-top:1px solid rgba(255,255,255,0.12);
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.score-divider span:first-child {
  font-family:'Fredoka One',cursive; font-size:8px; color:rgba(255,255,255,0.25);
}
.score-divider span:last-child {
  font-family:'Fredoka One',cursive; font-size:7px; color:rgba(255,255,255,0.18);
  text-transform:uppercase; letter-spacing:0.5px;
}
.tennis-pts {
  font-size:9px; font-weight:800;
  background:rgba(255,255,255,0.1); border-radius:8px;
  padding:0px 5px; color:#fff; min-width:22px; text-align:center;
}

/* ── SERVICE SWIPE ── */
#swipe-hint {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  font-family:'Fredoka One',cursive; font-size:14px; color:rgba(255,255,255,0.75);
  background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
  border-radius:22px; padding:8px 20px;
  pointer-events:none; z-index:20;
  border:1px solid rgba(255,255,255,0.15);
  display:none;
  animation:pulseHint 1.4s ease-in-out infinite;
}
@keyframes pulseHint { 0%,100%{opacity:0.75} 50%{opacity:1} }

/* ── POWER BAR ── */
#power-bar-wrap {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  display:none; flex-direction:column; align-items:center; gap:5px;
  pointer-events:none; z-index:20;
}
#power-bar-bg {
  width:160px; height:10px;
  background:rgba(255,255,255,0.15); border-radius:5px; overflow:hidden;
}
#power-bar-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,#4FC3F7,#FFE500,#FF5722);
  border-radius:5px; transition:width 0.05s;
}
#power-label {
  font-family:'Fredoka One',cursive; font-size:11px; color:rgba(255,255,255,0.6);
}
#tilt-indicator {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(8px);
  border-radius:30px; padding:8px 16px;
  pointer-events:none; z-index:20;
  border:1px solid rgba(255,255,255,0.1);
}
.tilt-bar-bg {
  width:120px; height:8px;
  background:rgba(255,255,255,0.12);
  border-radius:4px; overflow:hidden; position:relative;
}
.tilt-bar-fill {
  height:100%; width:50%;
  background:linear-gradient(90deg,#4FC3F7,#fff,#FF7043);
  border-radius:4px; transform:translateX(-50%);
  transition:transform 0.08s; position:absolute; left:0;
}
.tilt-label { font-size:11px; color:rgba(255,255,255,0.45); font-weight:800; }

/* ── BOUTON RETOUR ── */
#btn-retour {
  position:fixed; top:12px; left:12px; z-index:40;
  background:rgba(0,0,0,0.4); border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50%; width:40px; height:40px;
  color:white; font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ── POINT FLASH ── */
#point-flash {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive; font-size:52px; color:#FFE500;
  text-shadow:0 0 30px rgba(255,229,0,0.7), 3px 3px 0 rgba(0,0,0,0.4);
  pointer-events:none; z-index:40; opacity:0; transition:opacity 0.15s;
  white-space:nowrap;
}
#point-flash.show { opacity:1; }

/* ── RÉSULTAT ── */
#result-overlay {
  position:fixed; inset:0; display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:50;
  background:rgba(0,0,0,0.72); backdrop-filter:blur(12px);
}
#result-overlay.show { display:flex; }
.result-box {
  background:linear-gradient(135deg,#1B5E20,#0D47A1);
  border:2px solid rgba(255,255,255,0.25); border-radius:28px;
  padding:38px 48px; text-align:center; max-width:320px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.result-emoji { font-size:64px; margin-bottom:10px; }
.result-title {
  font-family:'Fredoka One',cursive; font-size:34px; color:#fff; margin-bottom:6px;
}
.result-sub { font-size:15px; color:rgba(255,255,255,0.65); margin-bottom:26px; font-weight:700; }
.result-btns { display:flex; gap:10px; justify-content:center; }
.result-btn {
  background:linear-gradient(135deg,#FFE500,#FF9800);
  color:#000; font-family:'Fredoka One',cursive; font-size:16px;
  border:none; border-radius:50px; padding:12px 28px;
  cursor:pointer; box-shadow:0 4px 0 #b36200;
  transition:transform .1s;
}
.result-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #b36200; }
.result-btn.secondary {
  background:rgba(255,255,255,0.15); color:white;
  box-shadow:0 4px 0 rgba(0,0,0,0.3);
}

/* ── START SCREEN ── */
#start-screen {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:100;
  background:linear-gradient(160deg,#1a2e1a 0%,#1B5E20 40%,#0D47A1 100%);
  gap:16px; padding:28px; text-align:center;
}
.start-emoji { font-size:72px; animation:bounce 1.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.start-title {
  font-family:'Fredoka One',cursive; font-size:3.2rem; color:#fff;
  text-shadow:3px 3px 0 rgba(0,0,0,0.3);
}
.start-sub { font-size:14px; color:rgba(255,255,255,0.6); max-width:280px; line-height:1.7; font-weight:700; }
.diff-grid { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.diff-btn {
  padding:14px 24px; border-radius:18px;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08); color:#fff;
  font-family:'Fredoka One',cursive; font-size:16px;
  cursor:pointer; transition:all 0.15s; min-width:105px;
}
.diff-btn:active { transform:scale(0.96); }
.diff-btn.selected {
  background:rgba(255,229,0,0.2); border-color:#FFE500; color:#FFE500;
}
.adv-card {
  background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15);
  border-radius:18px; padding:12px 24px; display:none; min-width:220px;
}
.adv-lbl { font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; font-weight:800; }
.adv-nom { font-family:'Fredoka One',cursive; font-size:1.6rem; color:#FFE500; margin-top:3px; }
.start-btn {
  background:linear-gradient(135deg,#FFE500,#FF9800);
  color:#000; font-family:'Fredoka One',cursive; font-size:1.3rem;
  border:none; border-radius:50px; padding:15px 42px;
  cursor:pointer; box-shadow:0 8px 0 #b36200;
  transition:transform .1s; display:none;
}
.start-btn.visible { display:block; }
.start-btn:active { transform:translateY(4px); box-shadow:0 4px 0 #b36200; }
</style>
</head>
<body>

<button id="btn-retour" onclick="window.location.href='../index.html'">←</button>

<div id="score-board">
  <div class="team-score left">
    <div class="team-name">🔵 Toi</div>
    <div class="score-val" id="score-joueur">0</div>
    <div class="tennis-pts" id="pts-joueur">0</div>
  </div>
  <div class="score-divider">
    <span id="sets-display">Sets 0–0</span>
    <span id="set-label">Jeu 1</span>
  </div>
  <div class="team-score right">
    <div class="tennis-pts" id="pts-adv">0</div>
    <div class="score-val" id="score-adv">0</div>
    <div class="team-name" id="adv-name-hud">🔴 CPU</div>
  </div>
</div>

<div id="swipe-hint">⬆️ Glisse pour servir !</div>
<div id="retour-hint" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.4);border-radius:20px;padding:6px 16px;pointer-events:none;z-index:20;display:none;">🎾 Swipe pour frapper !</div>
<div id="power-bar-wrap">
  <div id="power-bar-bg"><div id="power-bar-fill"></div></div>
  <div id="power-label">Puissance</div>
</div>

<div id="tilt-indicator">
  <span class="tilt-label">◀️</span>
  <div class="tilt-bar-bg"><div class="tilt-bar-fill" id="tiltFill"></div></div>
  <span class="tilt-label">▶️</span>
</div>

<div id="point-flash"></div>

<div id="result-overlay">
  <div class="result-box">
    <div class="result-emoji" id="res-emoji">🏆</div>
    <div class="result-title" id="res-title">Victoire !</div>
    <div class="result-sub"   id="res-sub">Tu as gagné le match !</div>
    <div class="result-btns">
      <button class="result-btn" onclick="location.reload()">🔄 Rejouer</button>
      <button class="result-btn secondary" onclick="window.location.href='../index.html'">🏠 Menu</button>
    </div>
  </div>
</div>

<div id="start-screen">
  <div class="start-emoji">🎾</div>
  <div class="start-title">Tennis</div>
  <div class="start-sub">2 contre 2 · Penche ton téléphone<br>pour diriger tes tirs · 3 jeux pour gagner !</div>
  <div class="diff-grid">
    <div class="diff-btn" onclick="choisirDiff('facile',this)">😊 Facile</div>
    <div class="diff-btn" onclick="choisirDiff('moyen',this)">😤 Moyen</div>
    <div class="diff-btn" onclick="choisirDiff('difficile',this)">💀 Difficile</div>
  </div>
  <div class="adv-card" id="adv-card">
    <div class="adv-lbl">Adversaire</div>
    <div class="adv-nom" id="adv-nom">…</div>
  </div>
  <button class="start-btn" id="startBtn" onclick="demarrer()">C'est parti ! 🎾</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/sensors.js"></script>
<script>
// ══════════════════════════════════════════
//  CONFIG NIVEAUX
//  delaiIA = nb de frames d'attente APRÈS que la balle
//  atteint la zone de l'IA avant qu'elle frappe.
//  Doit être petit (≤ temps de vol dans la zone arrière).
// ══════════════════════════════════════════
const DIFF = {
  facile:    { vitesse:0.030, erreurIA:0.45, delaiIA:3 },
  moyen:     { vitesse:0.042, erreurIA:0.20, delaiIA:2 },
  difficile: { vitesse:0.058, erreurIA:0.04, delaiIA:0 },
};

// ══════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════
let etat = {
  difficulte: null,
  adversaire: null,
  ptsJoueur:0, ptsAdv:0,
  jeuxJoueur:0, jeuxAdv:0,
  setsJoueur:0, setsAdv:0,       // ← sets gagnés (match en 3 sets, 2 sets pour gagner)
  jeuxDansSet:0,                  // numéro du jeu courant dans le set
  balle:{ x:0, y:1.2, z:0, vx:0, vy:0, vz:0, enVol:false, direction:1 },
  joueurTilt:0,
  phase:'service',
  animSpec:null,
  temps:0,
  ballesRenvoyees: 0,             // ← compteur de balles renvoyées avec succès par le joueur
};

// ══════════════════════════════════════════
//  THREE.JS
// ══════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 35, 85);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

// Lumières style Wii Sports
const sunLight = new THREE.DirectionalLight(0xFFF5E0, 1.5);
sunLight.position.set(12, 25, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048,2048);
sunLight.shadow.camera.left=-20; sunLight.shadow.camera.right=20;
sunLight.shadow.camera.top=20;   sunLight.shadow.camera.bottom=-20;
scene.add(sunLight, sunLight.target);
scene.add(new THREE.AmbientLight(0xB8D4F0, 0.8));
const fillLight = new THREE.DirectionalLight(0x90C0FF, 0.45);
fillLight.position.set(-10, 6, -8); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xFFE0B0, 0.3);
rimLight.position.set(0,-5,-15); scene.add(rimLight);

function phong(color, shin=60, spec=0x222222) {
  return new THREE.MeshPhongMaterial({ color, shininess:shin, specular:spec });
}
function obj(geo, mat, x=0, y=0, z=0, rx=0, ry=0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z);
  m.rotation.set(rx,ry,0);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

// ══════════════════════════════════════════
//  COURT DE TENNIS style Wii
// ══════════════════════════════════════════
function creerCourt() {
  const herbe = obj(new THREE.PlaneGeometry(100,100), phong(0x4CAF50,15,0x1B5E20), 0,0,0,-Math.PI/2);
  herbe.receiveShadow=true; scene.add(herbe);

  const surface = obj(new THREE.PlaneGeometry(10.97,23.77), phong(0xBF6B30,25,0x7A3A10), 0,0.01,0,-Math.PI/2);
  surface.receiveShadow=true; scene.add(surface);

  function ligne(w,h,x,z) {
    const m=obj(new THREE.PlaneGeometry(w,h), phong(0xFFFFFF,80), x,0.018,z,-Math.PI/2);
    scene.add(m);
  }
  ligne(10.97,0.06,0,-11.885); ligne(10.97,0.06,0,11.885);
  ligne(0.06,23.77,-5.485,0);  ligne(0.06,23.77,5.485,0);
  ligne(10.97,0.06,0,-6.4);    ligne(10.97,0.06,0,6.4);
  ligne(0.06,23.77,-4.115,0);  ligne(0.06,23.77,4.115,0);
  ligne(0.06,12.8,0,0);

  const filetMat = new THREE.MeshPhongMaterial({color:0xF5F5F5,transparent:true,opacity:0.85,shininess:60});
  const filet = obj(new THREE.BoxGeometry(10.97,0.91,0.06), filetMat, 0,0.455,0);
  scene.add(filet);
  scene.add(obj(new THREE.BoxGeometry(10.97,0.07,0.07), phong(0xFFFFFF,100), 0,0.89,0));
  [-5.55,5.55].forEach(x => {
    scene.add(obj(new THREE.CylinderGeometry(0.055,0.055,1.15,8), phong(0xCCCCCC,100), x,0.575,0));
  });

  const gradColors = [0xE53935, 0x1E88E5, 0x43A047, 0xFB8C00, 0x8E24AA, 0x00ACC1];
  // Gradins fond (derrière adversaire)
  [-13.8,-14.6,-15.5].forEach((z,i) => {
    scene.add(obj(new THREE.BoxGeometry(30,1.3+i*0.4,0.4), phong(gradColors[i%6],20), 0,0.65+i*0.9,z));
  });
  // Gradins fond (derrière joueur)
  [14.2,15.0].forEach((z,i) => {
    scene.add(obj(new THREE.BoxGeometry(30,1.0+i*0.3,0.4), phong(gradColors[(i+3)%6],20), 0,0.5+i*0.7,z));
  });
  // Sols surélevés latéraux (sans murs, juste le plancher pour que les Miis soient visibles)
  [-7.8,7.8].forEach((x,si) => {
    scene.add(obj(new THREE.PlaneGeometry(2.2,28), phong(gradColors[(si*2+1)%6],10), x,0.12,0,-Math.PI/2));
  });

  scene.add(obj(new THREE.PlaneGeometry(80,80), phong(0x388E3C,10), 0,-0.05,0,-Math.PI/2));

  for (let i=0;i<6;i++) {
    const c = obj(new THREE.SphereGeometry(3+Math.random()*2,10,7),
      new THREE.MeshPhongMaterial({color:0xFFFFFF,transparent:true,opacity:0.9}),
      (Math.random()-0.5)*80, 22+Math.random()*8, (Math.random()-0.5)*60);
    scene.add(c);
  }
}
creerCourt();

// ══════════════════════════════════════════
//  CRÉER UN MII style Wii
// ══════════════════════════════════════════
function creerMii(coulCorps, coulPeau, x, z, rotY, scale=1) {
  const g = new THREE.Group();
  const matCorps = phong(coulCorps, 60);
  const matPeau  = phong(coulPeau, 80, 0x332211);

  g.add(obj(new THREE.CylinderGeometry(0.3,0.24,0.72,10), matCorps, 0,0.56,0));
  g.add(obj(new THREE.SphereGeometry(0.30,16,12), matPeau, 0,1.18,0));
  [-0.1,0.1].forEach(ex => {
    g.add(obj(new THREE.SphereGeometry(0.065,8,8), phong(0x1a1a44,120), ex,1.22,0.25));
    g.add(obj(new THREE.SphereGeometry(0.028,6,6), phong(0xFFFFFF),     ex+0.02,1.24,0.28));
  });
  g.add(obj(new THREE.SphereGeometry(0.048,8,8), phong(0xCC4444,60), 0,1.08,0.26));
  [-0.16,0.16].forEach(cx => {
    g.add(obj(new THREE.SphereGeometry(0.065,8,8),
      new THREE.MeshPhongMaterial({color:0xFF9090,transparent:true,opacity:0.5}), cx,1.13,0.26));
  });
  [-0.13,0.13].forEach(jx => {
    g.add(obj(new THREE.CylinderGeometry(0.1,0.1,0.52,8), matCorps, jx,0.1,0));
  });
  const brasG = new THREE.Group();
  brasG.position.set(0,0.78,0);
  [-0.42,0.42].forEach((bx,i) => {
    const bras = obj(new THREE.CylinderGeometry(0.075,0.075,0.42,8), matPeau, bx,0,0);
    bras.rotation.z = i===0 ? 0.55 : -0.55;
    brasG.add(bras);
  });
  g.add(brasG);

  g.position.set(x,0,z);
  g.rotation.y = rotY;
  g.scale.setScalar(scale);
  g.castShadow = true;
  scene.add(g);
  return { g, brasG };
}

// ── Raquette ──
function creerRaquette(couleur) {
  const g = new THREE.Group();
  g.add(obj(new THREE.TorusGeometry(0.27,0.045,8,22), phong(couleur,100), 0,0.27,0));
  const cord = new THREE.Mesh(new THREE.PlaneGeometry(0.48,0.48),
    new THREE.MeshPhongMaterial({color:0xE8E8E8,transparent:true,opacity:0.55,side:THREE.DoubleSide}));
  cord.position.set(0,0.27,0); g.add(cord);
  g.add(obj(new THREE.CylinderGeometry(0.032,0.04,0.55,8), phong(0x5D4037,80), 0,-0.08,0));
  g.add(obj(new THREE.CylinderGeometry(0.038,0.038,0.18,8), phong(couleur,60), 0,-0.28,0));
  return g;
}

// ── Équipe bleue (joueur) — côté Z positif, face au filet (−Z)
// J1 : fond gauche  |  J2 : avant droit (plus proche du filet)
const miiJ1 = creerMii(0x1565C0, 0xFFCBA4, -2.2, 8.5, Math.PI);
const miiJ2 = creerMii(0x0288D1, 0xFFD1A0,  2.2, 3.0, Math.PI);
const raqJ1 = creerRaquette(0x1565C0);
miiJ1.g.add(raqJ1);
raqJ1.position.set(0.52,0.65,0); raqJ1.rotation.z=-0.35;  // droite locale = +x
const raqJ2 = creerRaquette(0x0288D1);

const miiA1 = creerMii(0xC62828, 0xFFCBA4,  2.2,-8.5, 0);  // fond, droite monde

let swipeActif = false;
let swipeStartY = 0, swipeStartX = 0;
let swipePower  = 0;

function serviceJoueur() {
  etat.balle = { x:0, y:2, z:6, vx:0, vy:0, vz:0, enVol:false, direction:1 };
  etat.phase = 'service';
  balleMesh.position.set(0,2,6);
  // Affiche l'indication de service
  document.getElementById('swipe-hint').style.display = 'block';
  document.getElementById('power-bar-wrap').style.display = 'none';
  document.getElementById('power-bar-fill').style.width = '0%';
  swipeActif = false;
}

function lancerService(power, angleX) {
  if (!jeuActif || etat.phase !== 'service') return;
  etat.phase = 'echange';
  document.getElementById('swipe-hint').style.display = 'none';
  document.getElementById('power-bar-wrap').style.display = 'none';

  const d = DIFF[difficulte];
  const vitMin = d.vitesse * 4;
  const vitMax = d.vitesse * 11;
  const vz = -(vitMin + power * (vitMax - vitMin));

  etat.balle.vx = angleX * d.vitesse * 4;
  etat.balle.vz = vz;
  etat.balle.vy = 0.04 + power * 0.02;
  etat.balle.enVol   = true;
  etat.balle.direction = -1;
  animerFrappe(miiJ1.brasG, raqJ1);
}

// Touch listeners pour le service ET les retours en échange
function attacherSwipeService() {
  const canvas = renderer.domElement;

  // Variables pour le swipe retour en échange
  let retourSwipeActif = false;
  let retourStartY = 0, retourStartX = 0, retourPower = 0;

  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (etat.phase === 'service' && jeuActif) {
      swipeStartY = t.clientY;
      swipeStartX = t.clientX;
      swipePower  = 0;
      swipeActif  = true;
      document.getElementById('swipe-hint').style.display = 'none';
      document.getElementById('power-bar-wrap').style.display = 'flex';
    } else if (etat.phase === 'echange' && jeuActif && etat.balle.direction === 1) {
      // Balle vient vers le joueur — préparer le retour
      retourStartY = t.clientY; retourStartX = t.clientX;
      retourPower = 0; retourSwipeActif = true;
      document.getElementById('retour-hint').style.display = 'none';
      document.getElementById('power-bar-wrap').style.display = 'flex';
    }
  }, { passive:true });

  canvas.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if (swipeActif && etat.phase === 'service') {
      const dy = swipeStartY - t.clientY;
      swipePower = Math.max(0, Math.min(1, dy / (window.innerHeight * 0.35)));
      document.getElementById('power-bar-fill').style.width = (swipePower * 100) + '%';
    } else if (retourSwipeActif && etat.phase === 'echange') {
      const dy = retourStartY - t.clientY;
      retourPower = Math.max(0, Math.min(1, dy / (window.innerHeight * 0.3)));
      document.getElementById('power-bar-fill').style.width = (retourPower * 100) + '%';
    }
  }, { passive:true });

  canvas.addEventListener('touchend', e => {
    const changedTouch = e.changedTouches[0];
    if (swipeActif && etat.phase === 'service') {
      swipeActif = false;
      document.getElementById('power-bar-wrap').style.display = 'none';
      const dx = changedTouch.clientX - swipeStartX;
      const angleX = Math.max(-1, Math.min(1, dx / (window.innerWidth * 0.3)));
      lancerService(swipePower, angleX);
    } else if (retourSwipeActif && etat.phase === 'echange') {
      retourSwipeActif = false;
      document.getElementById('power-bar-wrap').style.display = 'none';
      document.getElementById('power-bar-fill').style.width = '0%';
      // Stocker la puissance et le visé pour le prochain retour
      const dx = changedTouch.clientX - retourStartX;
      etat._retourPower = retourPower;
      etat._retourAngle = Math.max(-1, Math.min(1, dx / (window.innerWidth * 0.3)));
    }
  }, { passive:true });

  // Souris (desktop)
  canvas.addEventListener('mousedown', e => {
    if (etat.phase === 'service' && jeuActif) {
      swipeStartY = e.clientY; swipeStartX = e.clientX; swipePower = 0; swipeActif = true;
      document.getElementById('swipe-hint').style.display = 'none';
      document.getElementById('power-bar-wrap').style.display = 'flex';
    } else if (etat.phase === 'echange' && jeuActif && etat.balle.direction === 1) {
      retourStartY = e.clientY; retourStartX = e.clientX;
      retourPower = 0; retourSwipeActif = true;
      document.getElementById('power-bar-wrap').style.display = 'flex';
    }
  });
  canvas.addEventListener('mousemove', e => {
    if (swipeActif && etat.phase === 'service') {
      const dy = swipeStartY - e.clientY;
      swipePower = Math.max(0, Math.min(1, dy / (window.innerHeight * 0.35)));
      document.getElementById('power-bar-fill').style.width = (swipePower * 100) + '%';
    } else if (retourSwipeActif && etat.phase === 'echange') {
      const dy = retourStartY - e.clientY;
      retourPower = Math.max(0, Math.min(1, dy / (window.innerHeight * 0.3)));
      document.getElementById('power-bar-fill').style.width = (retourPower * 100) + '%';
    }
  });
  canvas.addEventListener('mouseup', e => {
    if (swipeActif && etat.phase === 'service') {
      swipeActif = false;
      document.getElementById('power-bar-wrap').style.display = 'none';
      const dx = e.clientX - swipeStartX;
      const angleX = Math.max(-1, Math.min(1, dx / (window.innerWidth * 0.3)));
      lancerService(swipePower, angleX);
    } else if (retourSwipeActif && etat.phase === 'echange') {
      retourSwipeActif = false;
      document.getElementById('power-bar-wrap').style.display = 'none';
      document.getElementById('power-bar-fill').style.width = '0%';
      const dx = e.clientX - retourStartX;
      etat._retourPower = retourPower;
      etat._retourAngle = Math.max(-1, Math.min(1, dx / (window.innerWidth * 0.3)));
    }
  });
}

// ── Compteur de frames pour le délai IA ──
let iaTimer = 0;
let iaADejaFrappe = false;

// Position x courante des joueurs IA (ils se déplacent vers la balle)
let iaA1_x = 2.2, iaA2_x = -2.2;

function updateBalle() {
  if (!etat.balle.enVol) return;
  const b = etat.balle;
  const d = DIFF[difficulte];

  b.x += b.vx;
  b.z += b.vz;
  b.y += b.vy;
  b.vy -= 0.005;

  // Rebond sol
  if (b.y < 0.16) {
    b.y = 0.16;
    b.vy = Math.abs(b.vy) * 0.62;
    if (Math.abs(b.vy) < 0.015) b.vy = 0.015;
  }

  // Rebond murs latéraux
  if (Math.abs(b.x) > 5.5) {
    b.vx *= -0.72;
    b.x = Math.sign(b.x) * 5.5;
  }

  // ── IA se déplace vers la balle en temps réel ──
  if (b.direction === -1 && b.z < 0) {
    // A1 (fond) se repositionne vers la balle si elle est dans son territoire
    if (b.z < -4.5) {
      iaA1_x += (b.x - iaA1_x) * 0.12;
      miiA1.g.position.x = iaA1_x;
    }
    // A2 (filet) se repositionne si la balle est côté filet
    if (b.z > -4.5 && b.z < -1.5) {
      iaA2_x += (b.x - iaA2_x) * 0.14;
      miiA2.g.position.x = iaA2_x;
    }
  }

  // ── IA frappe — fond de court A1 : toute la largeur, grande zone ──
  if (b.z < -5.0 && b.z > -9.0 && b.direction === -1 && !iaADejaFrappe) {
    iaTimer++;
    if (iaTimer >= d.delaiIA) {
      iaTimer = 0;
      iaADejaFrappe = true;

      // Cible aléatoire dans le terrain joueur, légèrement biaisée vers les côtés
      const cibleX = (Math.random() * 8) - 4; // entre -4 et +4
      const vitesse = d.vitesse * (4 + Math.random() * 3); // moins fort
      b.vx = (cibleX - b.x) * (vitesse / 14);
      b.vz = vitesse;
      b.vy = 0.05 + Math.random() * 0.03;
      b.direction = 1;
      animerFrappe(miiA1.brasG, raqA1);
    }
  }

  // ── IA frappe — filet A2 : retour doux aléatoire ──
  if (b.z < -1.5 && b.z > -5.0 && b.direction === -1 && !iaADejaFrappe) {
    const distX = Math.abs(b.x - iaA2_x);
    if (distX < 2.5) {
      iaTimer++;
      if (iaTimer >= d.delaiIA) {
        iaTimer = 0;
        iaADejaFrappe = true;

        const cibleX = (Math.random() * 8) - 4; // aléatoire
        const vitesse = d.vitesse * (3.5 + Math.random() * 2.5); // doux
        b.vx = (cibleX - b.x) * (vitesse / 12);
        b.vz = vitesse;
        b.vy = 0.03 + Math.random() * 0.02;
        b.direction = 1;
        animerFrappe(miiA2.brasG, raqA2);
      }
    }
  }

  // ── Joueur retourne — fond de court J1 ──
  if (b.z > 6.5 && b.z < 9.5 && b.direction === 1) {
    iaADejaFrappe = false; iaTimer = 0;
    // Puissance du swipe (0.5 par défaut si pas de swipe préparé)
    const power = etat._retourPower !== undefined ? etat._retourPower : 0.5;
    const angleSwipe = etat._retourAngle !== undefined ? etat._retourAngle : 0;
    etat._retourPower = undefined; etat._retourAngle = undefined;
    const angle = tiltX * 0.6 + angleSwipe * 0.3;
    const vitMult = 7 + power * 6; // 7 à 13 selon puissance
    b.vx = angle * d.vitesse * vitMult;
    b.vz = -d.vitesse * (8 + power * 4);
    b.vy = 0.03 + power * 0.02;
    b.direction = -1;
    animerFrappe(miiJ1.brasG, raqJ1);
    etat.ballesRenvoyees++; // ← comptage retour joueur J1
    // Afficher hint retour pour le prochain échange
    document.getElementById('retour-hint').style.display = 'block';
    setTimeout(()=>{ document.getElementById('retour-hint').style.display='none'; }, 1500);
  }

  // ── Joueur retourne — filet J2 ──
  if (b.z > 2.0 && b.z < 4.2 && b.x > 0.5 && b.direction === 1) {
    iaADejaFrappe = false; iaTimer = 0;
    const power = etat._retourPower !== undefined ? etat._retourPower : 0.4;
    const angleSwipe = etat._retourAngle !== undefined ? etat._retourAngle : 0;
    etat._retourPower = undefined; etat._retourAngle = undefined;
    const angle = tiltX * 0.5 + angleSwipe * 0.3;
    const vitMult = 6 + power * 6;
    b.vx = angle * d.vitesse * vitMult;
    b.vz = -d.vitesse * (8 + power * 3);
    b.vy = 0.015 + power * 0.015;
    b.direction = -1;
    animerFrappe(miiJ2.brasG, raqJ2);
    etat.ballesRenvoyees++; // ← comptage retour joueur J2
    document.getElementById('retour-hint').style.display = 'block';
    setTimeout(()=>{ document.getElementById('retour-hint').style.display='none'; }, 1500);
  }

  // Hors limites
  if (b.z > 13)  { pointAdversaire(); return; }
  if (b.z < -13) { pointJoueur();     return; }

  // Filet
  if (Math.abs(b.z) < 0.3 && b.y < 0.91) {
    if (b.direction === -1) pointAdversaire(); else pointJoueur();
    return;
  }

  balleMesh.position.set(b.x, b.y, b.z);
  ombreMesh.position.set(b.x, 0.02, b.z);
  ombreMesh.scale.setScalar(Math.max(0.3, 1 - b.y * 0.15));
}

// ── Animations frappe ──
function animerFrappe(brasGroup, raq) {
  let t=0;
  function step() {
    t++;
    raq.rotation.z = -0.35 - Math.sin(t*0.28)*0.9;
    brasGroup.rotation.x = -Math.abs(Math.sin(t*0.28))*0.3;
    if (t<22) requestAnimationFrame(step);
    else { raq.rotation.z=-0.35; brasGroup.rotation.x=0; }
  }
  requestAnimationFrame(step);
}

// ── Scoring tennis officiel — Sets (gagner 2 sets sur 3) ──
// Chaque set = 3 jeux à gagner en premier (pour rester fluide mobile)
const PTS_LBL = ['0','15','30','40'];
const JEUX_PAR_SET = 3; // nombre de jeux pour gagner un set

function mettreAJourScore() {
  const pj=etat.ptsJoueur, pa=etat.ptsAdv;
  let lj, la;

  // Deuce & avantage
  if (pj>=3 && pa>=3) {
    if (pj===pa)       { lj=la='Egal'; }
    else if (pj > pa)  { lj='Adv'; la='40'; }
    else               { lj='40';  la='Adv'; }
  } else {
    lj = PTS_LBL[Math.min(pj,3)];
    la = PTS_LBL[Math.min(pa,3)];
  }
  document.getElementById('pts-joueur').textContent = lj;
  document.getElementById('pts-adv').textContent    = la;

  // Jeu gagné ?
  const joueurGagne = (pj>=4 && pj-pa>=2);
  const advGagne    = (pa>=4 && pa-pj>=2);
  if (joueurGagne || advGagne) {
    if (joueurGagne) etat.jeuxJoueur++; else etat.jeuxAdv++;
    etat.ptsJoueur=0; etat.ptsAdv=0;
    etat.jeuxDansSet++;

    const sj=document.getElementById('score-joueur');
    const sa=document.getElementById('score-adv');
    sj.textContent=etat.jeuxJoueur;
    sa.textContent=etat.jeuxAdv;
    sj.classList.add('bump'); sa.classList.add('bump');
    setTimeout(()=>{ sj.classList.remove('bump'); sa.classList.remove('bump'); },500);

    afficherFlash(joueurGagne ? 'Jeu ! 🎾' : 'Jeu adverse 😬', joueurGagne ? '#FFE500' : '#FF7043');

    // Set gagné ? (premier à JEUX_PAR_SET jeux dans le set)
    if (etat.jeuxJoueur >= JEUX_PAR_SET || etat.jeuxAdv >= JEUX_PAR_SET) {
      const setGagneJoueur = etat.jeuxJoueur >= JEUX_PAR_SET;
      if (setGagneJoueur) etat.setsJoueur++; else etat.setsAdv++;

      // Afficher résultat du set
      afficherFlash(
        setGagneJoueur ? `Set ${etat.setsJoueur+etat.setsAdv} à toi ! 🏆` : `Set perdu 😬`,
        setGagneJoueur ? '#FFE500' : '#FF7043'
      );

      // Mettre à jour l'affichage des sets
      document.getElementById('sets-display').textContent = `Sets ${etat.setsJoueur}–${etat.setsAdv}`;

      // Match gagné ? (2 sets sur 3)
      if (etat.setsJoueur >= 2 || etat.setsAdv >= 2) {
        setTimeout(finDeMatch, 1200); return;
      }

      // Nouveau set — reset jeux
      etat.jeuxJoueur = 0; etat.jeuxAdv = 0; etat.jeuxDansSet = 0;
      document.getElementById('score-joueur').textContent = '0';
      document.getElementById('score-adv').textContent   = '0';
      const setNum = etat.setsJoueur + etat.setsAdv + 1;
      document.getElementById('set-label').textContent = `Set ${setNum}`;
      return;
    }

    // Mise à jour label jeu dans le set
    const jeuNum = etat.jeuxJoueur + etat.jeuxAdv + 1;
    document.getElementById('set-label').textContent = `Jeu ${jeuNum}`;

  } else {
    document.getElementById('score-joueur').textContent=etat.jeuxJoueur;
    document.getElementById('score-adv').textContent=etat.jeuxAdv;
  }
}

async function finDeMatch() {
  jeuActif=false;
  const victoire=etat.setsJoueur>etat.setsAdv;
  document.getElementById('res-emoji').textContent = victoire?'🏆':'😢';
  document.getElementById('res-title').textContent = victoire?'Victoire !':'Défaite...';
  document.getElementById('res-sub').textContent   = victoire
    ? `${etat.setsJoueur} sets – ${etat.setsAdv} · Excellent match !`
    : `${etat.setsJoueur} sets – ${etat.setsAdv} · Essaie encore !`;
  document.getElementById('result-overlay').classList.add('show');
  if (victoire) { animerSpec('joieForte'); if(navigator.vibrate) navigator.vibrate([60,30,60,30,120]); }
  else { if(navigator.vibrate) navigator.vibrate([20,10,20,10,20]); }

  // ── Sauvegarde Supabase ──
  const scoreTotal = etat.ballesRenvoyees; // nb de balles renvoyées avec succès
  const result = await sauvegarderFinPartie('tennis', { score: scoreTotal, gagne: victoire });
  if (result?.xp_gagne) {
    const xpEl = document.createElement('div');
    xpEl.style.cssText = 'font-family:"Fredoka One",cursive;font-size:1.1rem;color:#FFD700;text-align:center;margin-top:10px;';
    xpEl.textContent = `+${result.xp_gagne} XP ⭐`;
    document.querySelector('.result-box').appendChild(xpEl);
  }
}

// ══════════════════════════════════════════
//  ANIMATIONS MIIS
// ══════════════════════════════════════════
function animerJoie(miis) {
  let t=0;
  function step(){
    t++;
    miis.forEach(m=>m.position.y=Math.abs(Math.sin(t*0.38))*0.5);
    if(t<42) requestAnimationFrame(step); else miis.forEach(m=>m.position.y=0);
  }
  requestAnimationFrame(step);
}

function animerTristesse(miis) {
  let t=0;
  function step(){
    t++;
    miis.forEach(m=>m.rotation.z=Math.sin(t*0.28)*0.12);
    if(t<32) requestAnimationFrame(step); else miis.forEach(m=>m.rotation.z=0);
  }
  requestAnimationFrame(step);
}

function animerSpec(type) {
  const fin=Date.now()+(type==='joieForte'?3200:1600);
  etat.animSpec={type,fin};
  if (type==='joie'||type==='joieForte') jouerApplauds(type==='joieForte'?3.2:1.6);
}

function jouerApplauds(dur) {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const nb=Math.floor(dur*18);
    for(let i=0;i<nb;i++){
      const buf=ctx.createBuffer(1,ctx.sampleRate*.065,ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*Math.exp(-j/720);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1100;
      const g=ctx.createGain(); g.gain.value=.35+Math.random()*.25;
      src.connect(f); f.connect(g); g.connect(ctx.destination);
      src.start(ctx.currentTime+i/18+Math.random()*.05);
    }
  } catch(e){}
}

// ══════════════════════════════════════════
//  BOUCLE PRINCIPALE
// ══════════════════════════════════════════
let dernierTps=0;
function animate(tps) {
  requestAnimationFrame(animate);
  dernierTps=tps;
  etat.temps=tps;

  if (jeuActif) {
    updateBalle();
    appliquerTilt();
    const pct=(tiltX+1)/2*100;
    document.getElementById('tiltFill').style.transform=`translateX(${pct-50}%)`;
  }

  if (etat.animSpec&&Date.now()<etat.animSpec.fin) {
    const phase=tps*0.01;
    specMiis.forEach((s,i)=>{
      if (etat.animSpec.type==='joie'||etat.animSpec.type==='joieForte') {
        const beat=Math.abs(Math.sin(phase+i*0.45));
        s.g.position.y=(s.g.userData.baseY||0)+beat*0.3;
        s.brasG.rotation.z=.15+beat*1.1;
      }
    });
  } else if (etat.animSpec&&Date.now()>=etat.animSpec.fin) {
    specMiis.forEach(s=>{s.g.position.y=s.g.userData.baseY||0; s.brasG.rotation.z=.15;});
    etat.animSpec=null;
  } else {
    const t=tps*0.0012;
    specMiis.forEach((s,i)=>s.g.position.y=(s.g.userData.baseY||0)+Math.sin(t+i)*0.025);
  }

  if (jeuActif && etat.balle.enVol) {
    camera.position.x += (etat.balle.x*0.08 - camera.position.x) * 0.04;
  } else {
    camera.position.x += (0-camera.position.x)*0.03;
  }
  camera.lookAt(etat.balle.enVol ? new THREE.Vector3(etat.balle.x*0.3,1,0) : new THREE.Vector3(0,0,0));

  renderer.render(scene, camera);
}
animate(0);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

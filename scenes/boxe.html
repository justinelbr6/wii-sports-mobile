<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Boxe 🥊</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:       #D32F2F;
      --red-dark:  #B71C1C;
      --blue:      #1976D2;
      --blue-dark: #0D47A1;
      --orange:    #F5A623;
      --white:     #FFFFFF;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#1a0a0a; font-family:'Nunito',sans-serif; overflow:hidden; height:100vh; width:100vw; }
    #gameCanvas { position:fixed; top:0; left:0; width:100%; height:100%; touch-action:none; }

    /* ── HUD ── */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:12px 14px; display:flex; justify-content:space-between; align-items:flex-start;
      pointer-events:none;
    }
    .hud-card {
      background:rgba(0,0,0,0.45); backdrop-filter:blur(10px);
      border-radius:16px; padding:7px 12px; border:1px solid rgba(255,255,255,0.15);
    }
    .hud-label { font-size:0.58rem; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:1px; font-weight:700; }
    .hud-value { font-family:'Fredoka One',cursive; font-size:1.3rem; color:white; line-height:1.1; }

    /* ── BARRES DE VIE ── */
    #life-bars {
      position:fixed; top:0; left:0; right:0; z-index:11;
      padding:10px 14px; display:flex; gap:10px; align-items:center; pointer-events:none;
    }
    .life-block { flex:1; }
    .life-name  { font-family:'Fredoka One',cursive; font-size:0.78rem; color:rgba(255,255,255,0.75); margin-bottom:4px; }
    .life-name.right { text-align:right; }
    .life-track {
      height:14px; background:rgba(0,0,0,0.5); border-radius:8px;
      border:1.5px solid rgba(255,255,255,0.18); overflow:hidden;
    }
    .life-fill {
      height:100%; border-radius:7px; transition:width .25s ease;
    }
    .life-fill.joueur { background:linear-gradient(90deg,#43A047,#76FF03); }
    .life-fill.adv    { background:linear-gradient(90deg,#F44336,#FF8A65); }
    #round-badge {
      background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.25);
      border-radius:50%; width:42px; height:42px; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }
    #round-badge span { font-family:'Fredoka One',cursive; font-size:1rem; color:white; }

    /* ── MICRO INDICATEUR ── */
    #mic-wrap {
      position:fixed; bottom:130px; left:50%; transform:translateX(-50%);
      z-index:12; display:flex; flex-direction:column; align-items:center; gap:6px;
      pointer-events:none; opacity:0; transition:opacity .3s;
    }
    #mic-wrap.show { opacity:1; }
    #mic-label { font-family:'Fredoka One',cursive; font-size:0.85rem; color:white; }
    #mic-track {
      width:180px; height:16px; background:rgba(0,0,0,0.5);
      border-radius:10px; border:2px solid rgba(255,255,255,0.2); overflow:hidden;
    }
    #mic-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#43A047,#FFEB3B,#F44336);
      border-radius:9px; transition:width .08s;
    }
    #mic-pct { font-family:'Fredoka One',cursive; font-size:0.9rem; color:white; }

    /* ── BOUTONS PUNCH ── */
    #punch-btns {
      position:fixed; bottom:20px; left:0; right:0; z-index:12;
      display:flex; gap:20px; padding:0 24px; justify-content:space-between;
    }
    .punch-btn {
      flex:1; height:90px; border:none; border-radius:22px;
      font-family:'Fredoka One',cursive; font-size:1.5rem; color:white;
      cursor:pointer; position:relative; overflow:hidden;
      box-shadow:0 6px 0; transition:transform .08s, box-shadow .08s;
      -webkit-appearance:none; outline:none; user-select:none;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    }
    #btn-gauche { background:var(--blue);  box-shadow:0 6px 0 var(--blue-dark); }
    #btn-droite { background:var(--red);   box-shadow:0 6px 0 var(--red-dark);  }
    .punch-btn::before {
      content:''; position:absolute; top:0; left:0; right:0; height:48%;
      background:rgba(255,255,255,0.18); border-radius:22px 22px 0 0;
    }
    .punch-btn:active, .punch-btn.hit {
      transform:translateY(5px); box-shadow:0 1px 0 !important;
    }
    .punch-btn span { position:relative; z-index:1; font-size:2rem; }
    .punch-btn small { position:relative; z-index:1; font-size:0.72rem; font-weight:800; opacity:.85; letter-spacing:.5px; }

    /* ── HINT MICRO ── */
    #hint {
      position:fixed; bottom:122px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:white;
      font-family:'Fredoka One',cursive; font-size:0.88rem;
      padding:8px 20px; border-radius:50px; z-index:11;
      white-space:nowrap; pointer-events:none;
      animation:bounceY 1.8s ease-in-out infinite;
    }
    @keyframes bounceY { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }

    /* ── FLASH COUP ── */
    #flash {
      position:fixed; inset:0; z-index:20; pointer-events:none;
      opacity:0; transition:opacity .05s;
    }
    #flash.show { opacity:1; }

    /* ── OVERLAY ROUND ── */
    #round-overlay {
      position:fixed; inset:0; z-index:25; display:none;
      align-items:center; justify-content:center; flex-direction:column; gap:10px;
      background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);
    }
    #round-overlay.show { display:flex; }
    .round-title { font-family:'Fredoka One',cursive; font-size:3.5rem; color:white; text-shadow:3px 3px 0 rgba(255,0,0,0.4); animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1); }
    .round-sub   { font-family:'Fredoka One',cursive; font-size:1.2rem; color:rgba(255,255,255,0.7); }

    /* ── OVERLAY KO / FIN ── */
    #ko-overlay {
      position:fixed; inset:0; z-index:30; display:none;
      align-items:center; justify-content:center; flex-direction:column; gap:16px;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
    }
    #ko-overlay.show { display:flex; }
    .ko-title   { font-family:'Fredoka One',cursive; font-size:4rem; color:var(--orange); text-shadow:4px 4px 0 rgba(0,0,0,0.5); animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1); }
    .ko-winner  { font-family:'Fredoka One',cursive; font-size:1.8rem; color:white; }
    .ko-score   { font-size:1rem; color:rgba(255,255,255,0.55); font-weight:700; }
    .ko-vs      { display:flex; gap:24px; align-items:center; background:rgba(255,255,255,0.06); border-radius:20px; padding:14px 28px; }
    .ko-pl      { text-align:center; }
    .ko-pl-name { font-size:0.75rem; color:rgba(255,255,255,0.5); font-weight:700; text-transform:uppercase; }
    .ko-pl-hp   { font-family:'Fredoka One',cursive; font-size:1.8rem; color:white; }
    .ko-pl-hp.win { color:var(--orange); }
    .ko-sep     { font-family:'Fredoka One',cursive; font-size:1.4rem; color:rgba(255,255,255,0.3); }
    .ko-btn     { background:var(--red); color:white; font-family:'Fredoka One',cursive; font-size:1.1rem; border:none; border-radius:50px; padding:14px 32px; box-shadow:0 6px 0 var(--red-dark); cursor:pointer; }
    .ko-btn.blue { background:var(--blue); box-shadow:0 6px 0 var(--blue-dark); }

    /* ── ÉCRAN DÉMARRAGE ── */
    #start-screen {
      position:fixed; inset:0; z-index:35; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px; padding:24px;
      background:linear-gradient(180deg,#1a0505 0%,#0d0000 100%);
      text-align:center;
    }
    .start-emoji { font-size:5rem; animation:bounceY 1.5s ease-in-out infinite; }
    .start-title { font-family:'Fredoka One',cursive; font-size:2.8rem; color:white; }
    .niveau-btn {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.18);
      border-radius:16px; padding:12px 18px; color:white;
      font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer;
      transition:all .15s; width:100%; max-width:300px;
    }
    .niveau-btn:active { transform:scale(0.97); }
    .niveau-btn.selected { background:rgba(211,47,47,0.3); border-color:var(--red); box-shadow:0 0 0 3px rgba(211,47,47,0.2); }
    .niveau-btn span:nth-child(2) { flex:1; text-align:left; }
    .adv-card-start {
      background:rgba(255,255,255,0.07); border-radius:18px; padding:14px 24px;
      text-align:center; border:2px solid rgba(255,255,255,0.15);
    }
    .adv-lbl  { font-size:0.7rem; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:2px; font-weight:700; }
    .adv-nom  { font-family:'Fredoka One',cursive; font-size:1.7rem; color:var(--orange); }
    .start-btn {
      background:var(--red); color:white; font-family:'Fredoka One',cursive;
      font-size:1.4rem; border:none; border-radius:50px; padding:16px 48px;
      box-shadow:0 8px 0 var(--red-dark); cursor:pointer; transition:transform .1s;
    }
    .start-btn:active { transform:translateY(4px); box-shadow:0 4px 0 var(--red-dark); }
    .mic-info { font-size:0.78rem; color:rgba(255,255,255,0.35); max-width:260px; line-height:1.6; font-weight:700; }

    @keyframes popIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  </style>
</head>
<body>

<!-- Bouton retour -->
<button style="position:fixed;top:12px;left:16px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;z-index:40;color:white;" onclick="window.location.href='../index.html'">←</button>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- Barres de vie -->
<div id="life-bars" style="display:none;">
  <div class="life-block">
    <div class="life-name">Toi</div>
    <div class="life-track"><div class="life-fill joueur" id="life-joueur" style="width:100%"></div></div>
  </div>
  <div id="round-badge"><span id="round-num">R1</span></div>
  <div class="life-block">
    <div class="life-name right" id="adv-name-hud">CPU</div>
    <div class="life-track"><div class="life-fill adv" id="life-adv" style="width:100%"></div></div>
  </div>
</div>

<!-- HUD timer -->
<div id="hud" style="display:none;">
  <div style="flex:1"></div>
  <div class="hud-card">
    <div class="hud-label">Temps</div>
    <div class="hud-value" id="hud-timer">1:30</div>
  </div>
</div>

<!-- Indicateur micro -->
<div id="mic-wrap">
  <div id="mic-label">🎤 Crie fort !</div>
  <div id="mic-track"><div id="mic-fill"></div></div>
  <div id="mic-pct">0%</div>
</div>

<!-- Hint -->
<div id="hint">🥊 Appuie sur un bouton et CRIE fort !</div>

<!-- Flash coup reçu -->
<div id="flash"></div>

<!-- Boutons punch -->
<div id="punch-btns" style="display:none;">
  <button class="punch-btn" id="btn-gauche"
    ontouchstart="preparerPunch('gauche',event)" ontouchend="annulerPunch(event)"
    onmousedown="preparerPunch('gauche',event)" onmouseup="annulerPunch(event)">
    <span>🥊</span>
    <small>GAUCHE</small>
  </button>
  <button class="punch-btn" id="btn-droite"
    ontouchstart="preparerPunch('droite',event)" ontouchend="annulerPunch(event)"
    onmousedown="preparerPunch('droite',event)" onmouseup="annulerPunch(event)">
    <span>🥊</span>
    <small>DROITE</small>
  </button>
</div>

<!-- Overlay Round -->
<div id="round-overlay">
  <div class="round-title" id="round-title">Round 1</div>
  <div class="round-sub"   id="round-sub">Prêt ?</div>
</div>

<!-- Overlay KO / Fin -->
<div id="ko-overlay">
  <div class="ko-title"  id="ko-title">K.O. !</div>
  <div class="ko-winner" id="ko-winner">Tu gagnes !</div>
  <div class="ko-vs">
    <div class="ko-pl">
      <div class="ko-pl-name">Toi</div>
      <div class="ko-pl-hp win" id="ko-hp-j">100</div>
    </div>
    <div class="ko-sep">VS</div>
    <div class="ko-pl">
      <div class="ko-pl-name" id="ko-adv-name">CPU</div>
      <div class="ko-pl-hp" id="ko-hp-a">100</div>
    </div>
  </div>
  <button class="ko-btn" onclick="window.location.href='../index.html'">🏠 Menu</button>
  <button class="ko-btn blue" onclick="location.reload()">🔄 Rejouer</button>
</div>

<!-- Écran démarrage -->
<div id="start-screen">
  <span class="start-emoji">🥊</span>
  <div class="start-title">Boxe</div>

  <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;">
    <div style="font-family:'Fredoka One',cursive;color:rgba(255,255,255,0.5);font-size:0.8rem;text-align:center;letter-spacing:2px;text-transform:uppercase;">Choisir ton adversaire</div>
    <button class="niveau-btn" id="btn-facile"    onclick="choisirNiveau('facile')"><span>😊</span><span>Facile</span><span style="font-size:.68rem;opacity:.5">Punching-ball</span></button>
    <button class="niveau-btn" id="btn-moyen"     onclick="choisirNiveau('moyen')"><span>😤</span><span>Moyen</span><span style="font-size:.68rem;opacity:.5">Adversaire sérieux</span></button>
    <button class="niveau-btn" id="btn-difficile" onclick="choisirNiveau('difficile')"><span>💀</span><span>Difficile</span><span style="font-size:.68rem;opacity:.5">Imbattable ?</span></button>
  </div>

  <div class="adv-card-start" id="adv-card-start" style="display:none;">
    <div class="adv-lbl">Ton adversaire</div>
    <div class="adv-nom" id="adv-nom-start">Chargement...</div>
    <div style="font-size:.75rem;color:rgba(255,255,255,.35);font-weight:700;margin-top:2px;" id="adv-niv-start"></div>
  </div>

  <button class="start-btn" id="start-btn" style="display:none;" onclick="demarrerJeu()">🥊 Fight !</button>
  <p class="mic-info">🎤 Crie dans le micro pour la puissance<br>👆 Bouton Gauche ou Droite pour frapper</p>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/sensors.js"></script>

<script>
// ══════════════════════════════════════════════════════
//  ÉTAT DU JEU
// ══════════════════════════════════════════════════════
const ETAT = {
  round:        1,       // 1-3
  hpJoueur:     100,
  hpAdv:        100,
  enCombat:     false,
  peutFrapper:  false,
  punchCote:    null,    // 'gauche'|'droite' — bouton enfoncé
  adversaire:   null,
  niveau:       null,
  timerSec:     90,      // 1min30 par round
  timerInterval:null,
  finDePartie:  false,
};

// Paramètres par niveau (dégâts de l'adversaire par coup)
const NIVEAUX = {
  facile:    { degatsAdv:4,  vitesseAdv:3000, esquiveAdv:0.08 },
  moyen:     { degatsAdv:9,  vitesseAdv:2000, esquiveAdv:0.25 },
  difficile: { degatsAdv:16, vitesseAdv:1200, esquiveAdv:0.45 },
};

// ══════════════════════════════════════════════════════
//  CHOIX DU NIVEAU
// ══════════════════════════════════════════════════════
async function choisirNiveau(niveau) {
  ETAT.niveau = niveau;
  document.querySelectorAll('.niveau-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`btn-${niveau}`).classList.add('selected');
  document.getElementById('adv-nom-start').textContent = 'Recherche...';
  document.getElementById('adv-card-start').style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const adv = await getAdversaire('boxe', niveau);
  ETAT.adversaire = adv;
  const nom = adv ? adv.nom : 'CPU';
  const avatar = adv ? (adv.avatar || '🥊') : '🥊';
  document.getElementById('adv-nom-start').textContent = `${avatar} ${nom}`;
  document.getElementById('adv-niv-start').textContent = `Niveau : ${adv?.boxe || niveau}`;
  document.getElementById('adv-name-hud').textContent  = nom;
  document.getElementById('ko-adv-name').textContent   = nom;
  document.getElementById('start-btn').style.display   = 'block';
  if (navigator.vibrate) navigator.vibrate(20);
}

// ══════════════════════════════════════════════════════
//  THREE.JS — RING DE BOXE
// ══════════════════════════════════════════════════════
const canvas   = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a0505);
scene.fog = new THREE.Fog(0x1a0505, 20, 60);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5, 14);
camera.lookAt(0, 2, 0);

// Lumières
const spotMain = new THREE.SpotLight(0xfff5e0, 2.5, 40, Math.PI/5, 0.3, 1.5);
spotMain.position.set(0, 18, 0);
spotMain.castShadow = true;
spotMain.shadow.mapSize.set(1024,1024);
spotMain.target.position.set(0, 0, 0);
scene.add(spotMain, spotMain.target);

const spotL = new THREE.SpotLight(0xff6060, 1.0, 30, Math.PI/6, 0.5, 2);
spotL.position.set(-8, 14, 4); scene.add(spotL);
const spotR = new THREE.SpotLight(0x6090ff, 1.0, 30, Math.PI/6, 0.5, 2);
spotR.position.set(8, 14, 4); scene.add(spotR);
scene.add(new THREE.AmbientLight(0x200808, 1.2));

function phong(color, shin=60, spec=0x222222) {
  return new THREE.MeshPhongMaterial({ color, shininess:shin, specular:spec });
}

// ── RING ──
const ringGroupe = new THREE.Group();

// Sol du ring (toile)
const toileG = new THREE.BoxGeometry(12, 0.18, 12);
const toile  = new THREE.Mesh(toileG, phong(0xEEDDBB, 10, 0x888866));
toile.receiveShadow = true; ringGroupe.add(toile);

// Bords du ring (légèrement surélevés)
[[0,0,6.2],[0,0,-6.2],[6.2,0,0],[-6.2,0,0]].forEach(([x,y,z]) => {
  const isZ = z !== 0;
  const bG = new THREE.BoxGeometry(isZ ? 12.4 : 0.3, 0.32, isZ ? 0.3 : 12.4);
  const b  = new THREE.Mesh(bG, phong(0x222222, 20));
  b.position.set(x, 0.25, z); ringGroupe.add(b);
});

// Cordes (3 hauteurs × 4 côtés)
const cordeMat = phong(0xFFFFFF, 80, 0xAAAAAA);
const cordeMatR = phong(0xFF3333, 80, 0x882222);
[0.8, 1.4, 2.0].forEach((h, hi) => {
  const mat = hi === 1 ? cordeMatR : cordeMat;
  // Cordes avant/arrière
  [-6, 6].forEach(z => {
    const cG = new THREE.CylinderGeometry(0.045, 0.045, 12.4, 8);
    const c  = new THREE.Mesh(cG, mat);
    c.rotation.z = Math.PI/2; c.position.set(0, h, z); ringGroupe.add(c);
  });
  // Cordes gauche/droite
  [-6, 6].forEach(x => {
    const cG = new THREE.CylinderGeometry(0.045, 0.045, 12.4, 8);
    const c  = new THREE.Mesh(cG, mat);
    c.position.set(x, h, 0); ringGroupe.add(c);
  });
});

// Poteaux de coin
[[-6,-6],[6,-6],[-6,6],[6,6]].forEach(([x,z]) => {
  const pG = new THREE.CylinderGeometry(0.12, 0.12, 2.4, 8);
  const p  = new THREE.Mesh(pG, phong(0xCC4400, 60, 0x882200));
  p.position.set(x, 1.2, z); p.castShadow=true; ringGroupe.add(p);
  // Protège-coin
  const pcG = new THREE.BoxGeometry(0.35, 1.5, 0.35);
  const pc  = new THREE.Mesh(pcG, phong(0xFF4422, 30));
  pc.position.set(x, 1.2, z); ringGroupe.add(pc);
});

// Estrade (plateforme sous le ring)
const estradeG = new THREE.BoxGeometry(14, 0.5, 14);
const estrade  = new THREE.Mesh(estradeG, phong(0x3a2010, 20, 0x221100));
estrade.position.y = -0.34; estrade.receiveShadow=true; ringGroupe.add(estrade);

// Sol de la salle
const solG = new THREE.PlaneGeometry(80, 80);
const sol  = new THREE.Mesh(solG, phong(0x111111, 5));
sol.rotation.x = -Math.PI/2; sol.position.y = -0.6; sol.receiveShadow=true; scene.add(sol);

// Lumières de scène (projecteurs style gymnase)
[[-8,12,-8],[8,12,-8],[0,12,8],[-8,12,8],[8,12,8]].forEach(([x,y,z]) => {
  const lampG = new THREE.CylinderGeometry(0.18, 0.35, 0.5, 8);
  const lamp  = new THREE.Mesh(lampG, phong(0x888888, 120));
  lamp.position.set(x, y, z); scene.add(lamp);

const COULEURS_PEAU  = [0xfad9b4, 0xd4956a, 0xf5c8a0, 0xe8b080, 0xc47a45];

function creerMiiSpectateur(x, z, angle, corps, peau) {

  g.position.set(x, -0.55, z);

}

// Placer 24 Miis en cercle autour du ring
const NB_SPEC = 24;
for (let i = 0; i < NB_SPEC; i++) {
  const angle = (i / NB_SPEC) * Math.PI * 2;
  const r     = 8.5 + (i % 3) * 1.2; // 3 rangées
  const x     = Math.sin(angle) * r;
  const z     = Math.cos(angle) * r;
  const corps = COULEURS_CORPS[i % COULEURS_CORPS.length];
  const peau  = COULEURS_PEAU[i % COULEURS_PEAU.length];
  const faceAngle = angle + Math.PI; // regarde vers le ring
  spectateursMiis.push(creerMiiSpectateur(x, z, faceAngle, corps, peau));
}

let micStream = null, micAnalyser = null, micDataArr = null, micAudioCtx = null;

async function initMicro() {
  try {
    micAudioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    micStream    = await navigator.mediaDevices.getUserMedia({ audio:true });
    const src    = micAudioCtx.createMediaStreamSource(micStream);
    micAnalyser  = micAudioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micDataArr   = new Uint8Array(micAnalyser.frequencyBinCount);
    src.connect(micAnalyser);
  } catch(e) {
    console.warn('Micro non disponible:', e);
  }
}

function getNiveauMicro() { // retourne 0..100
  if (!micAnalyser) return 50; // fallback si pas de micro
  micAnalyser.getByteFrequencyData(micDataArr);
  let sum = 0;
  for (let i = 0; i < micDataArr.length; i++) sum += micDataArr[i];
  const avg = sum / micDataArr.length;
  return Math.min(100, (avg / 60) * 100);
}

// ══════════════════════════════════════════════════════
//  SYSTÈME DE PUNCH
// ══════════════════════════════════════════════════════
let punchCote   = null; // côté enfoncé actuellement
let punchPret   = false;
let micLevel    = 0;

function preparerPunch(cote, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  if (!ETAT.enCombat || !ETAT.peutFrapper) return;
  punchCote = cote;
  punchPret = true;
  document.getElementById('mic-wrap').classList.add('show');
  document.getElementById('hint').style.opacity = '0';
  document.getElementById(`btn-${cote}`).classList.add('hit');
  if (navigator.vibrate) navigator.vibrate(15);
}

function annulerPunch(e) {
  if (e) e.preventDefault();
  if (!punchPret) return;
  // Lance le coup avec la puissance accumulée
  const puissance = micLevel;
  lancerCoup(punchCote, puissance);
  punchPret = false;
  punchCote = null;
  document.getElementById('mic-wrap').classList.remove('show');
  document.getElementById('btn-gauche').classList.remove('hit');
  document.getElementById('btn-droite').classList.remove('hit');
}

function lancerCoup(cote, puissance) {
  if (!ETAT.enCombat || !ETAT.peutFrapper || ETAT.finDePartie) return;
  ETAT.peutFrapper = false;
  setTimeout(() => { ETAT.peutFrapper = true; }, 400);

  const cfg = NIVEAUX[ETAT.niveau] || NIVEAUX.moyen;
  // Esquive adversaire selon niveau
  if (Math.random() < cfg.esquiveAdv) {
    animerEsquiveAdv(cote);
    if (navigator.vibrate) navigator.vibrate(10);
    setTimeout(() => { ETAT.peutFrapper = true; }, 300);
    return;
  }

  // Dégâts = puissance (0-100) × facteur
  const dmg = Math.max(3, Math.round(puissance * 0.28 + 3));
  ETAT.hpAdv = Math.max(0, ETAT.hpAdv - dmg);
  mettreAJourBarresVie();

  // Animation punch joueur
  animerPunchJoueur(cote);
  // Flash éclair
  flashCoup(false);
  if (navigator.vibrate) navigator.vibrate(30);

  // Secouer adversaire
  if (miiAdv) {
    const tOrig = miiAdv.position.clone();
    const t0 = Date.now();
    const shk = () => {
      const dt = (Date.now()-t0)/200;
      if (dt < 1) { miiAdv.position.x = tOrig.x + Math.sin(dt*Math.PI*6)*(0.2*(1-dt)); requestAnimationFrame(shk); }
      else { miiAdv.position.x = tOrig.x; }
    };
    shk();
  }

  // KO ?
  if (ETAT.hpAdv <= 0) { finCombat('joueur'); return; }
  // Applaudissements spectateurs si beau coup
  if (dmg >= 18) animerApplaudsSpec(1200);
}

//  COUPS ADVERSAIRE (IA)
// ══════════════════════════════════════════════════════
let advTimerRef = null;
function planifierCoupAdv() {
  if (!ETAT.enCombat || ETAT.finDePartie) return;
  const cfg = NIVEAUX[ETAT.niveau] || NIVEAUX.moyen;
  advTimerRef = setTimeout(() => {
    if (!ETAT.enCombat || ETAT.finDePartie) return;
    const cote = Math.random() < 0.5 ? 'gauche' : 'droite';
    animerPunchAdv(cote);
    flashCoup(true);
    // Dégâts
    const dmg = cfg.degatsAdv + Math.floor(Math.random() * 5);
    ETAT.hpJoueur = Math.max(0, ETAT.hpJoueur - dmg);
    mettreAJourBarresVie();
    if (navigator.vibrate) navigator.vibrate([20,10,20]);
    // Secouer caméra
    secouerCamera();
    if (ETAT.hpJoueur <= 0) { finCombat('adv'); return; }
    planifierCoupAdv();
  }, cfg.vitesseAdv + Math.random()*800);
}

// ══════════════════════════════════════════════════════
//  ANIMATIONS MIIS
// ══════════════════════════════════════════════════════
function animerPunchJoueur(cote) {
  const bras = cote === 'gauche' ? miiJBrasG : miiJBrasD;
  if (!bras) return;
  const signe = cote === 'gauche' ? -1 : 1;
  const t0 = Date.now();
  const step = () => {
    const dt = (Date.now()-t0)/250;
    if (dt < 1) {
      bras.rotation.x = -Math.sin(dt * Math.PI) * 1.4;
      bras.rotation.z = signe * Math.sin(dt * Math.PI * 0.5) * 0.4;
      requestAnimationFrame(step);
    } else { bras.rotation.x = 0; bras.rotation.z = 0; }
  };
  step();
}

function animerPunchAdv(cote) {
  const bras = cote === 'gauche' ? miiABrasG : miiABrasD;
  if (!bras) return;
  const signe = cote === 'gauche' ? -1 : 1;
  const t0 = Date.now();
  const step = () => {
    const dt = (Date.now()-t0)/220;
    if (dt < 1) {
      bras.rotation.x = -Math.sin(dt * Math.PI) * 1.3;
      bras.rotation.z = signe * Math.sin(dt * Math.PI * 0.5) * 0.35;
      requestAnimationFrame(step);
    } else { bras.rotation.x = 0; bras.rotation.z = 0; }
  };
  step();
}

function animerEsquiveAdv(cote) {
  if (!miiAdv) return;
  const dir = cote === 'gauche' ? 0.6 : -0.6;
  const t0 = Date.now();
  const origX = miiAdv.position.x, origY = miiAdv.rotation.y;
  const step = () => {
    const dt = (Date.now()-t0)/350;
    if (dt < 1) {
      miiAdv.position.x = origX + Math.sin(dt*Math.PI)*dir;
      miiAdv.rotation.y = origY + Math.sin(dt*Math.PI)*0.4;
      requestAnimationFrame(step);
    } else { miiAdv.position.x = origX; miiAdv.rotation.y = origY; }
  };
  step();
}

// Spectateurs qui applaudissent
let animSpec = null;
function animerApplaudsSpec(duree) {
  const fin = Date.now() + duree;
  animSpec = { fin, fn: () => {
    const phase = Date.now() * 0.009;
    spectateursMiis.forEach((s,i) => {
      const beat = Math.abs(Math.sin(phase + i*0.35));
      s.brasG.rotation.z =  0.2 + beat * 1.3;
      s.brasD.rotation.z = -0.2 - beat * 1.3;
      s.g.position.y = -0.55 + beat * 0.1;
    });
  }};
  jouerApplaudsSON(duree/1000);
}

function jouerApplaudsSON(duree) {
  try {
    const ctx = micAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const nb  = Math.floor(duree * 15);
    for (let i=0; i<nb; i++) {
      const buf  = ctx.createBuffer(1, ctx.sampleRate*0.065, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j=0; j<data.length; j++) data[j] = (Math.random()*2-1)*Math.exp(-j/700);
      const src  = ctx.createBufferSource(); src.buffer=buf;
      const filt = ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1000;
      const gain = ctx.createGain(); gain.gain.value = 0.35+Math.random()*0.25;
      src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
      src.start(ctx.currentTime + i/15 + Math.random()*0.05);
    }
  } catch(e){}
}

function demarrerTimer() {

// ══════════════════════════════════════════════════════
//  GESTION DES ROUNDS
// ══════════════════════════════════════════════════════
function demarrerRound(num) {
  ETAT.round       = num;
  ETAT.enCombat    = false;
  ETAT.peutFrapper = false;
  clearTimeout(advTimerRef);

  const overlay = document.getElementById('round-overlay');
  document.getElementById('round-title').textContent = num <= 3 ? `Round ${num}` : 'FIGHT !';
  document.getElementById('round-sub').textContent   = num === 1 ? 'Prêt ?' : num <= 3 ? 'Nouveau round !' : '';
  document.getElementById('round-num').textContent   = `R${num}`;
  overlay.classList.add('show');

  // Compte à rebours 3…2…1…FIGHT !
  let cpt = 3;
  const countDown = setInterval(() => {
    cpt--;
    if (cpt > 0) {
      document.getElementById('round-title').textContent = cpt.toString();
      if (navigator.vibrate) navigator.vibrate(40);
    } else {
      clearInterval(countDown);
      document.getElementById('round-title').textContent = 'FIGHT !';
      setTimeout(() => {
        overlay.classList.remove('show');
        ETAT.enCombat    = true;
        ETAT.peutFrapper = true;
        demarrerTimer();
        planifierCoupAdv();
      }, 600);
    }
  }, 800);
}

function finRound() {
  ETAT.enCombat = false;
  clearTimeout(advTimerRef);

  if (ETAT.round >= 3) {
    // Décision aux points
    const gagne = ETAT.hpJoueur > ETAT.hpAdv;
    finCombat(gagne ? 'joueur' : 'adv', true);
    return;
  }
  // Prochain round — récupération partielle
  ETAT.hpJoueur = Math.min(100, ETAT.hpJoueur + 25);
  ETAT.hpAdv    = Math.min(100, ETAT.hpAdv    + 25);
  mettreAJourBarresVie();
  setTimeout(() => demarrerRound(ETAT.round + 1), 1200);
}

function finCombat(vainqueur, decision=false) {
  ETAT.finDePartie = true;
  ETAT.enCombat    = false;
  clearInterval(ETAT.timerInterval);
  clearTimeout(advTimerRef);

  const joueurGagne = vainqueur === 'joueur';
  const titre  = decision ? (joueurGagne ? '🏆 Victoire !' : '😔 Défaite') : (joueurGagne ? '🥊 K.O. !' : '💥 K.O. !');
  const winner = joueurGagne ? 'Tu gagnes !' : `${ETAT.adversaire?.nom || 'CPU'} gagne !`;

  document.getElementById('ko-title').textContent  = titre;
  document.getElementById('ko-winner').textContent = winner;
  document.getElementById('ko-hp-j').textContent   = `${ETAT.hpJoueur} PV`;
  document.getElementById('ko-hp-a').textContent   = `${ETAT.hpAdv} PV`;
  document.getElementById('ko-hp-j').className     = `ko-pl-hp${joueurGagne?' win':''}`;
  document.getElementById('ko-hp-a').className     = `ko-pl-hp${!joueurGagne?' win':''}`;

  if (joueurGagne) {
    animerApplaudsSpec(3500);
    if (navigator.vibrate) navigator.vibrate([60,30,60,30,120]);
  }

  setTimeout(() => document.getElementById('ko-overlay').classList.add('show'), 400);
}

// ══════════════════════════════════════════════════════
//  BOUCLE DE JEU
// ══════════════════════════════════════════════════════
let frameCount = 0;
const CAM_ORIG = new THREE.Vector3(0, 5, 14);

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  // Mise à jour micro en temps réel
  if (punchPret && micAnalyser) {
    micLevel = getNiveauMicro();
    document.getElementById('mic-fill').style.width = micLevel + '%';
    document.getElementById('mic-pct').textContent  = Math.round(micLevel) + '%';
  }

  // Drapeau respiration Miis spectateurs
  if (animSpec) {
    animSpec.fn();
    if (Date.now() >= animSpec.fin) {
      animSpec = null;
      spectateursMiis.forEach(s => { s.brasG.rotation.z=0.15; s.brasD.rotation.z=-0.15; s.g.position.y=-0.55; });
    }
  } else {
    const t = frameCount * 0.01;
    spectateursMiis.forEach((s,i) => {
      s.g.position.y = -0.55 + Math.sin(t + i) * 0.02;
      // Légère agitation aléatoire
      if (ETAT.enCombat && Math.random() < 0.003) {
        s.brasG.rotation.z = 0.1 + Math.random()*0.5;
        s.brasD.rotation.z = -(0.1 + Math.random()*0.5);
      }
    });
  }

  // Secousse caméra après coup reçu
  if (camShake > 0) {
    camera.position.x = CAM_ORIG.x + (Math.random()-0.5)*camShake*0.04;
    camera.position.y = CAM_ORIG.y + (Math.random()-0.5)*camShake*0.02;
    camShake *= 0.75;
    if (camShake < 0.1) { camera.position.copy(CAM_ORIG); camShake = 0; }
  }

  // Balancement idle Mii joueur
  if (miiJoueur && ETAT.enCombat) {
    miiJoueur.position.y = -0.55 + Math.sin(frameCount*0.05)*0.04;
    miiJoueur.rotation.y = 0.25 + Math.sin(frameCount*0.03)*0.06;
  }
  if (miiAdv && ETAT.enCombat) {
    miiAdv.position.y = -0.55 + Math.sin(frameCount*0.05 + 1)*0.04;
    miiAdv.rotation.y = -0.25 + Math.sin(frameCount*0.03 + 1)*0.06;
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Boxe 🥊</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:        #D32F2F;
      --red-dark:   #B71C1C;
      --blue:       #1565C0;
      --blue-dark:  #0D47A1;
      --orange:     #F5A623;
      --green:      #2E7D32;
      --green-dark: #1B5E20;
      --purple:     #6A1B9A;
      --purple-dark:#4A148C;
      --white:      #FFFFFF;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0d0005; font-family:'Nunito',sans-serif; overflow:hidden; height:100vh; width:100vw; }
    #gameCanvas { position:fixed; top:0; left:0; width:100%; height:100%; touch-action:none; }

    /* ── HUD TIMER ── */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:10px 14px; display:flex; justify-content:center; align-items:flex-start;
      pointer-events:none;
    }
    .hud-card {
      background:rgba(0,0,0,0.55); backdrop-filter:blur(12px);
      border-radius:20px; padding:6px 20px; border:1px solid rgba(255,255,255,0.15);
    }
    .hud-label { font-size:0.55rem; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:2px; font-weight:800; text-align:center; }
    .hud-value { font-family:'Fredoka One',cursive; font-size:1.5rem; color:white; line-height:1.1; text-align:center; }

    /* ── BARRES DE VIE ── */
    #life-bars {
      position:fixed; top:0; left:0; right:0; z-index:11;
      padding:8px 14px; display:flex; gap:8px; align-items:center; pointer-events:none;
    }
    .life-block { flex:1; }
    .life-name  { font-family:'Fredoka One',cursive; font-size:0.75rem; color:rgba(255,255,255,0.8); margin-bottom:3px; }
    .life-name.right { text-align:right; }
    .life-track {
      height:13px; background:rgba(0,0,0,0.6); border-radius:8px;
      border:1.5px solid rgba(255,255,255,0.15); overflow:hidden;
    }
    .life-fill { height:100%; border-radius:7px; transition:width .25s ease; }
    .life-fill.joueur { background:linear-gradient(90deg,#43A047,#76FF03); }
    .life-fill.adv    { background:linear-gradient(90deg,#F44336,#FF8A65); }
    #round-badge {
      background:rgba(0,0,0,0.7); border:2px solid rgba(255,255,255,0.2);
      border-radius:50%; width:40px; height:40px; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }
    #round-badge span { font-family:'Fredoka One',cursive; font-size:0.9rem; color:white; }

    /* ── MICRO ── */
    #mic-wrap {
      position:fixed; bottom:148px; left:50%; transform:translateX(-50%);
      z-index:12; display:flex; flex-direction:column; align-items:center; gap:4px;
      pointer-events:none; opacity:0; transition:opacity .25s;
    }
    #mic-wrap.show { opacity:1; }
    #mic-label { font-family:'Fredoka One',cursive; font-size:0.8rem; color:white; }
    #mic-track {
      width:160px; height:14px; background:rgba(0,0,0,0.5);
      border-radius:9px; border:2px solid rgba(255,255,255,0.2); overflow:hidden;
    }
    #mic-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#43A047,#FFEB3B,#F44336);
      border-radius:8px; transition:width .06s;
    }
    #mic-pct { font-family:'Fredoka One',cursive; font-size:0.85rem; color:white; }

    /* ══════════════════════════════════
       BOUTONS DE JEU — LAYOUT 2×2
       Haut : ESQUIVE gauche | ESQUIVE droite
       Bas  : PUNCH gauche   | PUNCH droite
    ══════════════════════════════════ */
    #game-btns {
      position:fixed; bottom:16px; left:0; right:0; z-index:12;
      display:none;
      flex-direction:column; gap:10px; padding:0 18px;
    }

    /* Rangée esquives */
    #esquive-row {
      display:flex; gap:10px;
    }
    .esq-btn {
      flex:1; height:54px; border:none; border-radius:16px;
      font-family:'Fredoka One',cursive; font-size:1.05rem; color:white;
      cursor:pointer; position:relative; overflow:hidden;
      -webkit-appearance:none; outline:none; user-select:none;
      display:flex; align-items:center; justify-content:center; gap:6px;
      background:var(--purple); box-shadow:0 5px 0 var(--purple-dark);
      transition:transform .08s, box-shadow .08s, opacity .2s;
    }
    .esq-btn::before {
      content:''; position:absolute; top:0; left:0; right:0; height:45%;
      background:rgba(255,255,255,0.15); border-radius:16px 16px 0 0;
    }
    .esq-btn:active, .esq-btn.active {
      transform:translateY(4px); box-shadow:0 1px 0 var(--purple-dark) !important;
    }
    .esq-btn.cooldown { opacity:.45; pointer-events:none; }
    .esq-btn span { position:relative; z-index:1; font-size:1.3rem; }
    .esq-btn small { position:relative; z-index:1; font-size:0.62rem; font-weight:800; opacity:.85; letter-spacing:.5px; }

    /* Barre de cooldown esquive */
    .esq-cd-bar {
      position:absolute; bottom:0; left:0; height:4px;
      background:rgba(255,255,255,0.7); border-radius:0 0 16px 16px;
      width:0%; transition:none;
    }

    /* Rangée punches */
    #punch-row {
      display:flex; gap:10px;
    }
    .punch-btn {
      flex:1; height:78px; border:none; border-radius:20px;
      font-family:'Fredoka One',cursive; font-size:1.4rem; color:white;
      cursor:pointer; position:relative; overflow:hidden;
      box-shadow:0 6px 0; transition:transform .08s, box-shadow .08s;
      -webkit-appearance:none; outline:none; user-select:none;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    }
    #btn-gauche { background:var(--blue); box-shadow:0 6px 0 var(--blue-dark); }
    #btn-droite { background:var(--red);  box-shadow:0 6px 0 var(--red-dark);  }
    .punch-btn::before {
      content:''; position:absolute; top:0; left:0; right:0; height:46%;
      background:rgba(255,255,255,0.16); border-radius:20px 20px 0 0;
    }
    .punch-btn:active, .punch-btn.hit {
      transform:translateY(5px); box-shadow:0 1px 0 !important;
    }
    .punch-btn span  { position:relative; z-index:1; font-size:1.9rem; }
    .punch-btn small { position:relative; z-index:1; font-size:0.68rem; font-weight:800; opacity:.85; letter-spacing:.5px; }

    /* ── HINT ── */
    #hint {
      position:fixed; bottom:156px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:white;
      font-family:'Fredoka One',cursive; font-size:0.82rem;
      padding:7px 18px; border-radius:50px; z-index:11;
      white-space:nowrap; pointer-events:none; opacity:0;
      transition:opacity .4s;
      animation:bounceY 1.8s ease-in-out infinite;
    }

    /* ── INDICATEUR D'ESQUIVE (miss!) ── */
    #esquive-indicator {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-family:'Fredoka One',cursive; font-size:2.8rem; color:#FFD600;
      text-shadow:3px 3px 0 rgba(0,0,0,0.5);
      z-index:22; pointer-events:none;
      opacity:0; transition:opacity .1s;
    }
    #esquive-indicator.show { opacity:1; }

    /* ── FLASH ── */
    #flash {
      position:fixed; inset:0; z-index:20; pointer-events:none;
      opacity:0; transition:opacity .05s;
    }
    #flash.show { opacity:1; }

    /* ── OVERLAY ROUND ── */
    #round-overlay {
      position:fixed; inset:0; z-index:25; display:none;
      align-items:center; justify-content:center; flex-direction:column; gap:10px;
      background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    }
    #round-overlay.show { display:flex; }
    .round-title { font-family:'Fredoka One',cursive; font-size:3.8rem; color:white; text-shadow:3px 3px 0 rgba(255,0,0,0.4); animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1); }
    .round-sub   { font-family:'Fredoka One',cursive; font-size:1.2rem; color:rgba(255,255,255,0.65); }

    /* ── OVERLAY KO ── */
    #ko-overlay {
      position:fixed; inset:0; z-index:30; display:none;
      align-items:center; justify-content:center; flex-direction:column; gap:16px;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(12px);
    }
    #ko-overlay.show { display:flex; }
    .ko-title   { font-family:'Fredoka One',cursive; font-size:4rem; color:var(--orange); text-shadow:4px 4px 0 rgba(0,0,0,0.5); animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1); }
    .ko-winner  { font-family:'Fredoka One',cursive; font-size:1.8rem; color:white; }
    .ko-vs      { display:flex; gap:24px; align-items:center; background:rgba(255,255,255,0.07); border-radius:20px; padding:14px 28px; }
    .ko-pl      { text-align:center; }
    .ko-pl-name { font-size:0.72rem; color:rgba(255,255,255,0.45); font-weight:800; text-transform:uppercase; }
    .ko-pl-hp   { font-family:'Fredoka One',cursive; font-size:1.8rem; color:white; }
    .ko-pl-hp.win { color:var(--orange); }
    .ko-sep     { font-family:'Fredoka One',cursive; font-size:1.4rem; color:rgba(255,255,255,0.3); }
    .ko-btn     { background:var(--red); color:white; font-family:'Fredoka One',cursive; font-size:1.1rem; border:none; border-radius:50px; padding:14px 32px; box-shadow:0 6px 0 var(--red-dark); cursor:pointer; }
    .ko-btn.blue { background:var(--blue); box-shadow:0 6px 0 var(--blue-dark); }

    /* ── ÉCRAN DÉMARRAGE ── */
    #start-screen {
      position:fixed; inset:0; z-index:35; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px; padding:24px;
      background:radial-gradient(ellipse at 50% 20%,#2a0010 0%,#0d0005 70%);
      text-align:center;
    }
    .start-emoji { font-size:4.5rem; animation:bounceY 1.5s ease-in-out infinite; }
    .start-title { font-family:'Fredoka One',cursive; font-size:2.8rem; color:white; }
    .niveau-btn {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.15);
      border-radius:16px; padding:11px 16px; color:white;
      font-family:'Fredoka One',cursive; font-size:1.05rem; cursor:pointer;
      transition:all .15s; width:100%; max-width:300px;
    }
    .niveau-btn:active { transform:scale(0.97); }
    .niveau-btn.selected { background:rgba(211,47,47,0.3); border-color:var(--red); box-shadow:0 0 0 3px rgba(211,47,47,0.2); }
    .niveau-btn span:nth-child(2) { flex:1; text-align:left; }
    .adv-card-start {
      background:rgba(255,255,255,0.07); border-radius:18px; padding:12px 22px;
      text-align:center; border:2px solid rgba(255,255,255,0.12);
    }
    .adv-lbl { font-size:0.68rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; font-weight:800; }
    .adv-nom { font-family:'Fredoka One',cursive; font-size:1.6rem; color:var(--orange); }
    .start-btn {
      background:var(--red); color:white; font-family:'Fredoka One',cursive;
      font-size:1.4rem; border:none; border-radius:50px; padding:15px 46px;
      box-shadow:0 8px 0 var(--red-dark); cursor:pointer; transition:transform .1s;
    }
    .start-btn:active { transform:translateY(4px); box-shadow:0 4px 0 var(--red-dark); }
    .mic-info { font-size:0.75rem; color:rgba(255,255,255,0.3); max-width:260px; line-height:1.6; font-weight:700; }

    @keyframes bounceY { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
    @keyframes popIn   { from{opacity:0;transform:scale(0.4)} to{opacity:1;transform:scale(1)} }
    @keyframes floatUp { 0%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-120%) scale(1.4)} }
    .float-up { animation:floatUp .7s ease-out forwards; }
  </style>
</head>
<body>

<button style="position:fixed;top:10px;left:14px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;z-index:40;color:white;" onclick="history.back()">←</button>

<canvas id="gameCanvas"></canvas>

<!-- Barres de vie -->
<div id="life-bars" style="display:none;">
  <div class="life-block">
    <div class="life-name">Toi</div>
    <div class="life-track"><div class="life-fill joueur" id="life-joueur" style="width:100%"></div></div>
  </div>
  <div id="round-badge"><span id="round-num">R1</span></div>
  <div class="life-block">
    <div class="life-name right" id="adv-name-hud">CPU</div>
    <div class="life-track"><div class="life-fill adv" id="life-adv" style="width:100%"></div></div>
  </div>
</div>

<!-- HUD Timer -->
<div id="hud" style="display:none;">
  <div class="hud-card">
    <div class="hud-label">Temps</div>
    <div class="hud-value" id="hud-timer">1:30</div>
  </div>
</div>

<!-- Indicateur micro -->
<div id="mic-wrap">
  <div id="mic-label">🎤 Crie fort !</div>
  <div id="mic-track"><div id="mic-fill"></div></div>
  <div id="mic-pct">0%</div>
</div>

<!-- Hint -->
<div id="hint">🥊 Frappe + crie · 🛡️ Esquive les coups !</div>

<!-- Flash coup reçu -->
<div id="flash"></div>

<!-- Indicateur ESQUIVE / MISS -->
<div id="esquive-indicator"></div>

<!-- ══ BOUTONS DE JEU : ESQUIVE + PUNCH ══ -->
<div id="game-btns">

  <!-- Rangée du haut : ESQUIVES -->
  <div id="esquive-row">
    <button class="esq-btn" id="esq-gauche"
      ontouchstart="activerEsquive('gauche',event)" onmousedown="activerEsquive('gauche',event)">
      <span>🛡️</span><small>← ESQUIVE</small>
      <div class="esq-cd-bar" id="cd-gauche"></div>
    </button>
    <button class="esq-btn" id="esq-droite"
      ontouchstart="activerEsquive('droite',event)" onmousedown="activerEsquive('droite',event)">
      <small>ESQUIVE →</small><span>🛡️</span>
      <div class="esq-cd-bar" id="cd-droite"></div>
    </button>
  </div>

  <!-- Rangée du bas : PUNCHES -->
  <div id="punch-row">
    <button class="punch-btn" id="btn-gauche"
      ontouchstart="preparerPunch('gauche',event)" ontouchend="annulerPunch(event)"
      onmousedown="preparerPunch('gauche',event)" onmouseup="annulerPunch(event)">
      <span>🥊</span><small>GAUCHE</small>
    </button>
    <button class="punch-btn" id="btn-droite"
      ontouchstart="preparerPunch('droite',event)" ontouchend="annulerPunch(event)"
      onmousedown="preparerPunch('droite',event)" onmouseup="annulerPunch(event)">
      <span>🥊</span><small>DROITE</small>
    </button>
  </div>

</div>

<!-- Overlay Round -->
<div id="round-overlay">
  <div class="round-title" id="round-title">Round 1</div>
  <div class="round-sub"   id="round-sub">Prêt ?</div>
</div>

<!-- Overlay KO -->
<div id="ko-overlay">
  <div class="ko-title"  id="ko-title">K.O. !</div>
  <div class="ko-winner" id="ko-winner">Tu gagnes !</div>
  <div class="ko-vs">
    <div class="ko-pl">
      <div class="ko-pl-name">Toi</div>
      <div class="ko-pl-hp win" id="ko-hp-j">100</div>
    </div>
    <div class="ko-sep">VS</div>
    <div class="ko-pl">
      <div class="ko-pl-name" id="ko-adv-name">CPU</div>
      <div class="ko-pl-hp"   id="ko-hp-a">100</div>
    </div>
  </div>
  <button class="ko-btn" onclick="history.back()">🏠 Menu</button>
  <button class="ko-btn blue" onclick="location.reload()">🔄 Rejouer</button>
</div>

<!-- Écran démarrage -->
<div id="start-screen">
  <span class="start-emoji">🥊</span>
  <div class="start-title">Boxe</div>
  <div style="display:flex;flex-direction:column;gap:9px;width:100%;max-width:300px;">
    <div style="font-family:'Fredoka One',cursive;color:rgba(255,255,255,0.4);font-size:0.75rem;text-align:center;letter-spacing:2px;text-transform:uppercase;">Choisir ton adversaire</div>
    <button class="niveau-btn" id="btn-facile"    onclick="choisirNiveau('facile')"><span>😊</span><span>Facile</span><span style="font-size:.65rem;opacity:.45">Punching-ball</span></button>
    <button class="niveau-btn" id="btn-moyen"     onclick="choisirNiveau('moyen')"><span>😤</span><span>Moyen</span><span style="font-size:.65rem;opacity:.45">Adversaire sérieux</span></button>
    <button class="niveau-btn" id="btn-difficile" onclick="choisirNiveau('difficile')"><span>💀</span><span>Difficile</span><span style="font-size:.65rem;opacity:.45">Imbattable ?</span></button>
  </div>
  <div class="adv-card-start" id="adv-card-start" style="display:none;">
    <div class="adv-lbl">Ton adversaire</div>
    <div class="adv-nom" id="adv-nom-start">Chargement...</div>
    <div style="font-size:.72rem;color:rgba(255,255,255,.3);font-weight:800;margin-top:2px;" id="adv-niv-start"></div>
  </div>
  <button class="start-btn" id="start-btn" style="display:none;" onclick="demarrerJeu()">🥊 Fight !</button>
  <p class="mic-info">🎤 Crie pour frapper fort · 🛡️ Esquive les attaques</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  DONNÉES ADVERSAIRES (autonome, sans Supabase)
// ══════════════════════════════════════════════════════
const ADVERSAIRES_DB = {
  facile:    [
    { nom:'Marco',     avatar:'😊', boxe:'Facile'    },
    { nom:'Léo',       avatar:'🐣', boxe:'Facile'    },
    { nom:'Sam',       avatar:'🙂', boxe:'Facile'    },
  ],
  moyen:     [
    { nom:'Viktor',    avatar:'😤', boxe:'Moyen'     },
    { nom:'Aiko',      avatar:'🔥', boxe:'Moyen'     },
    { nom:'Carlos',    avatar:'😠', boxe:'Moyen'     },
  ],
  difficile: [
    { nom:'Iron Rex',  avatar:'💀', boxe:'Difficile' },
    { nom:'Kira',      avatar:'👹', boxe:'Difficile' },
    { nom:'Doom',      avatar:'☠️', boxe:'Difficile' },
  ],
};

async function getAdversaire(sport, niveau) {
  const liste = ADVERSAIRES_DB[niveau] || ADVERSAIRES_DB.moyen;
  return liste[Math.floor(Math.random() * liste.length)];
}

// ══════════════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════════════
const ETAT = {
  round:1, hpJoueur:100, hpAdv:100,
  enCombat:false, peutFrapper:false,
  enEsquive:false,     // ← fenêtre d'invincibilité active
  adversaire:null, niveau:null,
  timerSec:90, timerInterval:null, finDePartie:false,
};

const NIVEAUX = {
  facile:    { degatsAdv:4,  vitesseAdv:3000, esquiveAdv:0.08 },
  moyen:     { degatsAdv:9,  vitesseAdv:1900, esquiveAdv:0.28 },
  difficile: { degatsAdv:16, vitesseAdv:1100, esquiveAdv:0.48 },
};

// Cooldowns esquive (ms)
const ESQ_DUREE    = 500;   // fenêtre d'invincibilité
const ESQ_COOLDOWN = 2200;  // temps avant de pouvoir re-esquiver
let   esqCdG = false, esqCdD = false;

// ══════════════════════════════════════════════════════
//  CHOIX DU NIVEAU
// ══════════════════════════════════════════════════════
async function choisirNiveau(niveau) {
  ETAT.niveau = niveau;
  document.querySelectorAll('.niveau-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`btn-${niveau}`).classList.add('selected');
  document.getElementById('adv-nom-start').textContent = 'Recherche...';
  document.getElementById('adv-card-start').style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const adv    = await getAdversaire('boxe', niveau);
  ETAT.adversaire = adv;
  const nom    = adv?.nom    || 'CPU';
  const avatar = adv?.avatar || '🥊';

  document.getElementById('adv-nom-start').textContent = `${avatar} ${nom}`;
  document.getElementById('adv-niv-start').textContent = `Niveau : ${adv?.boxe || niveau}`;
  document.getElementById('adv-name-hud').textContent  = nom;
  document.getElementById('ko-adv-name').textContent   = nom;
  document.getElementById('start-btn').style.display   = 'block';
  if (navigator.vibrate) navigator.vibrate(20);
}

// ══════════════════════════════════════════════════════
//  THREE.JS
// ══════════════════════════════════════════════════════
const canvas   = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0005);
scene.fog = new THREE.Fog(0x0d0005, 18, 55);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);

const SPEC_MIIS=[];
const CC=[0xe53935,0x1976D2,0xF57C00,0x7B1FA2,0x00796B,0x558B2F,0xFF4081,0x0097A7,0xFFC107,0x795548];
const CP=[0xfad9b4,0xd4956a,0xf5c8a0,0xe8b080,0xc47a45];

function creerSpec(x,z,ang,corps,peau){
  const g=new THREE.Group();
  const m=c=>new THREE.MeshPhongMaterial({color:c,shininess:35});
  const body=new THREE.Mesh(new THREE.BoxGeometry(.55,.72,.35),m(corps)); body.position.y=.7; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(.28,10,10),m(peau)); head.position.y=1.44; g.add(head);
  [-0.1,0.1].forEach(ex=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),m(0x222244)); e.position.set(ex,1.49,.26); g.add(e); });
  const bMesh=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.12,6),m(0x992222)); bMesh.position.set(0,1.34,.26); bMesh.rotation.z=Math.PI/2; g.add(bMesh);
  [-0.14,0.14].forEach(jx=>{ const j=new THREE.Mesh(new THREE.BoxGeometry(.22,.52,.25),m(0x1a1a2e)); j.position.set(jx,.23,0); g.add(j); });
  const brasG=new THREE.Group(); brasG.position.set(-.38,1.06,0);
  const bgm=new THREE.Mesh(new THREE.BoxGeometry(.18,.46,.18),m(corps)); bgm.position.set(0,-.18,0); brasG.add(bgm); g.add(brasG);
  const brasD=new THREE.Group(); brasD.position.set(.38,1.06,0);
  const bdm=new THREE.Mesh(new THREE.BoxGeometry(.18,.46,.18),m(corps)); bdm.position.set(0,-.18,0); brasD.add(bdm); g.add(brasD);
  g.position.set(x,-.55,z); g.rotation.y=ang; g.castShadow=true; scene.add(g);
  return {g,brasG,brasD};
}
for(let i=0;i<24;i++){
  const a=(i/24)*Math.PI*2, r=8.5+(i%3)*1.2;
  SPEC_MIIS.push(creerSpec(Math.sin(a)*r,Math.cos(a)*r,a+Math.PI,CC[i%CC.length],CP[i%CP.length]));
}

let micAnalyser=null, micDataArr=null, micAudioCtx=null;

async function initMicro(){
  try{
    micAudioCtx = new(window.AudioContext||window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const src    = micAudioCtx.createMediaStreamSource(stream);
    micAnalyser  = micAudioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micDataArr   = new Uint8Array(micAnalyser.frequencyBinCount);
    src.connect(micAnalyser);
  }catch(e){ micAnalyser=null; console.warn('Micro indisponible (fallback 50%):',e); }
}

function getNiveauMicro(){
  if(!micAnalyser) return 50;
  micAnalyser.getByteFrequencyData(micDataArr);
  let s=0; for(let i=0;i<micDataArr.length;i++) s+=micDataArr[i];
  return Math.min(100,(s/micDataArr.length/60)*100);
}

function activerEsquive(cote, e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  if(!ETAT.enCombat || ETAT.finDePartie) return;
  const enCd = cote==='gauche' ? esqCdG : esqCdD;
  if(enCd) return; // cooldown actif

  ETAT.enEsquive = true;
  if(navigator.vibrate) navigator.vibrate(25);

  const btn  = document.getElementById(`esq-${cote}`);
  const cdBar = document.getElementById(`cd-${cote}`);
  btn.classList.add('active');

  // Animation esquive du Mii joueur
  animerEsquiveJoueur(cote);

  // Fenêtre d'invincibilité
  setTimeout(()=>{ ETAT.enEsquive = false; }, ESQ_DUREE);

  // Déclenche le cooldown
  if(cote==='gauche') esqCdG=true; else esqCdD=true;
  btn.classList.remove('active');
  btn.classList.add('cooldown');

  // Anime la barre de cooldown
  cdBar.style.transition='none'; cdBar.style.width='100%';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      cdBar.style.transition=`width ${ESQ_COOLDOWN}ms linear`;
      cdBar.style.width='0%';
    });
  });

  setTimeout(()=>{
    if(cote==='gauche') esqCdG=false; else esqCdD=false;
    btn.classList.remove('cooldown');
  }, ESQ_COOLDOWN);
}

let punchCote=null, punchPret=false, micLevel=0;

function preparerPunch(cote,e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  if(!ETAT.enCombat||!ETAT.peutFrapper) return;
  punchCote=cote; punchPret=true;
  document.getElementById('mic-wrap').classList.add('show');
  document.getElementById(`btn-${cote}`).classList.add('hit');
  if(navigator.vibrate) navigator.vibrate(12);
}

function annulerPunch(e){
  if(e) e.preventDefault();
  if(!punchPret) return;
  lancerCoup(punchCote, micLevel);
  punchPret=false; punchCote=null;
  document.getElementById('mic-wrap').classList.remove('show');
  document.getElementById('btn-gauche').classList.remove('hit');
  document.getElementById('btn-droite').classList.remove('hit');
}

function lancerCoup(cote, puissance){
  if(!ETAT.enCombat||!ETAT.peutFrapper||ETAT.finDePartie) return;
  ETAT.peutFrapper=false;
  setTimeout(()=>{ ETAT.peutFrapper=true; },380);

  const cfg=NIVEAUX[ETAT.niveau]||NIVEAUX.moyen;
  if(Math.random()<cfg.esquiveAdv){
    animerEsquiveAdv(cote);
    afficherIndicateur('💨 Esquivé !', '#FFD600');
    setTimeout(()=>{ ETAT.peutFrapper=true; },280);
    return;
  }

  const dmg=Math.max(3,Math.round(puissance*.28+3));
  ETAT.hpAdv=Math.max(0,ETAT.hpAdv-dmg);
  mettreAJourBarresVie();
  animerPunchJoueur(cote);
  flashCoup(false);
  if(navigator.vibrate) navigator.vibrate(28);

  // Recul adversaire
  if(miiA){
    const ox=miiA.position.x; const t0=Date.now();
    const shk=()=>{ const dt=(Date.now()-t0)/200; if(dt<1){ miiA.position.x=ox+Math.sin(dt*Math.PI*6)*(.22*(1-dt)); requestAnimationFrame(shk); } else miiA.position.x=ox; };
    shk();
  }

  if(ETAT.hpAdv<=0){ finCombat('joueur'); return; }
  if(dmg>=18) animerApplaudsSpec(1200);
}

//  IA ADVERSAIRE
// ══════════════════════════════════════════════════════
let advTimerRef=null;

function planifierCoupAdv(){
  if(!ETAT.enCombat||ETAT.finDePartie) return;
  const cfg=NIVEAUX[ETAT.niveau]||NIVEAUX.moyen;
  advTimerRef=setTimeout(()=>{
    if(!ETAT.enCombat||ETAT.finDePartie) return;
    const cote=Math.random()<.5?'gauche':'droite';
    animerPunchAdv(cote);

    // Le joueur est-il en train d'esquiver ?
    if(ETAT.enEsquive){
      // Coup raté !
      flashCoup(false); // flash jaune (coup évité)
      afficherIndicateur('🛡️ Esquive !', '#00E676');
      if(navigator.vibrate) navigator.vibrate(15);
    } else {
      flashCoup(true);
      const dmg=cfg.degatsAdv+Math.floor(Math.random()*5);
      ETAT.hpJoueur=Math.max(0,ETAT.hpJoueur-dmg);
      mettreAJourBarresVie();
      if(navigator.vibrate) navigator.vibrate([18,8,18]);
      secouerCamera();
      if(ETAT.hpJoueur<=0){ finCombat('adv'); return; }
    }
    planifierCoupAdv();
  }, cfg.vitesseAdv+Math.random()*700);
}

function animerPunchJoueur(cote){
  const bras=cote==='gauche'?miiJBG:miiJBD;
  const sg=cote==='gauche'?-1:1;
  if(!bras) return;
  const t0=Date.now();
  const step=()=>{ const dt=(Date.now()-t0)/240; if(dt<1){ bras.rotation.x=-Math.sin(dt*Math.PI)*1.5; bras.rotation.z=sg*Math.sin(dt*Math.PI*.5)*.45; requestAnimationFrame(step); } else{ bras.rotation.x=0; bras.rotation.z=0; } };
  step();
}

function animerPunchAdv(cote){
  const bras=cote==='gauche'?miiABG:miiABD;
  const sg=cote==='gauche'?-1:1;
  if(!bras) return;
  const t0=Date.now();
  const step=()=>{ const dt=(Date.now()-t0)/220; if(dt<1){ bras.rotation.x=-Math.sin(dt*Math.PI)*1.4; bras.rotation.z=sg*Math.sin(dt*Math.PI*.5)*.4; requestAnimationFrame(step); } else{ bras.rotation.x=0; bras.rotation.z=0; } };
  step();
}

function animerEsquiveAdv(cote){
  if(!miiA) return;
  const dir=cote==='gauche'?.7:-.7;
  const ox=miiA.position.x, oy=miiA.rotation.y;
  const t0=Date.now();
  const step=()=>{ const dt=(Date.now()-t0)/360; if(dt<1){ miiA.position.x=ox+Math.sin(dt*Math.PI)*dir; miiA.rotation.y=oy+Math.sin(dt*Math.PI)*.45; requestAnimationFrame(step); } else{ miiA.position.x=ox; miiA.rotation.y=oy; } };
  step();
}

// Animation esquive joueur : glisse sur le côté opposé à l'attaque
function animerEsquiveJoueur(cote){
  if(!miiJ) return;
  // Esquive gauche → Mii se décale à gauche; droite → à droite
  const dir=cote==='gauche'?-.9:.9;
  const ox=miiJ.position.x, oy=miiJ.rotation.y;
  const t0=Date.now();
  const step=()=>{
    const dt=(Date.now()-t0)/400;
    if(dt<1){
      miiJ.position.x = ox+Math.sin(dt*Math.PI)*dir;
      miiJ.rotation.y = oy+Math.sin(dt*Math.PI)*(cote==='gauche'?-.3:.3);
      requestAnimationFrame(step);
    } else { miiJ.position.x=ox; miiJ.rotation.y=oy; }
  };
  step();
}

// ── Applaudissements ──
let animSpec=null;
function animerApplaudsSpec(duree){
  animSpec={fin:Date.now()+duree,fn:()=>{
    const ph=Date.now()*.009;
    SPEC_MIIS.forEach((s,i)=>{ const b=Math.abs(Math.sin(ph+i*.35)); s.brasG.rotation.z=.2+b*1.3; s.brasD.rotation.z=-.2-b*1.3; s.g.position.y=-.55+b*.1; });
  }};
  try{
    const ctx=micAudioCtx||new(window.AudioContext||window.webkitAudioContext)();
    const nb=Math.floor(duree/1000*15);
    for(let i=0;i<nb;i++){
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.065),ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.exp(-j/700);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const filt=ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1000;
      const gain=ctx.createGain(); gain.gain.value=.35+Math.random()*.25;
      src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
      src.start(ctx.currentTime+i/15+Math.random()*.05);
    }
  }catch(e){}
}

// ── Flash & caméra ──
function flashCoup(recu){
  const el=document.getElementById('flash');
  el.style.background=recu?'rgba(255,0,0,0.28)':'rgba(255,220,0,0.15)';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),85);
}

let camShake=0;
function secouerCamera(){ camShake=9; }

// ══════════════════════════════════════════════════════
//  BARRES DE VIE
// ══════════════════════════════════════════════════════
function mettreAJourBarresVie(){
  document.getElementById('life-joueur').style.width=ETAT.hpJoueur+'%';
  document.getElementById('life-adv').style.width   =ETAT.hpAdv+'%';
}

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
function demarrerTimer(){
  ETAT.timerSec=90; clearInterval(ETAT.timerInterval);
  ETAT.timerInterval=setInterval(()=>{
    if(ETAT.finDePartie){ clearInterval(ETAT.timerInterval); return; }
    ETAT.timerSec--;
    const m=Math.floor(ETAT.timerSec/60), s=ETAT.timerSec%60;
    document.getElementById('hud-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    if(ETAT.timerSec<=0){ clearInterval(ETAT.timerInterval); finRound(); }
  },1000);
}

// ══════════════════════════════════════════════════════
//  ROUNDS
// ══════════════════════════════════════════════════════
function demarrerRound(num){
  ETAT.round=num; ETAT.enCombat=false; ETAT.peutFrapper=false; ETAT.enEsquive=false;
  clearTimeout(advTimerRef);
  document.getElementById('round-title').textContent=`Round ${num}`;
  document.getElementById('round-sub').textContent=num===1?'Prêt ?':'Nouveau round !';
  document.getElementById('round-num').textContent=`R${num}`;
  document.getElementById('round-overlay').classList.add('show');

  let cpt=3;
  const cd=setInterval(()=>{
    cpt--;
    if(cpt>0){ document.getElementById('round-title').textContent=cpt.toString(); if(navigator.vibrate) navigator.vibrate(40); }
    else{
      clearInterval(cd);
      document.getElementById('round-title').textContent='FIGHT !';
      setTimeout(()=>{
        document.getElementById('round-overlay').classList.remove('show');
        ETAT.enCombat=true; ETAT.peutFrapper=true;
        if(num===1){
          const h=document.getElementById('hint'); h.style.opacity='1';
          setTimeout(()=>{ h.style.opacity='0'; },3500);
        }
        demarrerTimer(); planifierCoupAdv();
      },600);
    }
  },800);
}

function finRound(){
  ETAT.enCombat=false; clearTimeout(advTimerRef);
  if(ETAT.round>=3){ finCombat(ETAT.hpJoueur>ETAT.hpAdv?'joueur':'adv',true); return; }
  ETAT.hpJoueur=Math.min(100,ETAT.hpJoueur+25);
  ETAT.hpAdv=Math.min(100,ETAT.hpAdv+25);
  mettreAJourBarresVie();
  setTimeout(()=>demarrerRound(ETAT.round+1),1200);
}

function finCombat(vainqueur,decision=false){
  ETAT.finDePartie=true; ETAT.enCombat=false;
  clearInterval(ETAT.timerInterval); clearTimeout(advTimerRef);
  const jg=vainqueur==='joueur';
  document.getElementById('ko-title').textContent  = decision?(jg?'🏆 Victoire !':'😔 Défaite'):(jg?'🥊 K.O. !':'💥 K.O. !');
  document.getElementById('ko-winner').textContent = jg?'Tu gagnes !':`${ETAT.adversaire?.nom||'CPU'} gagne !`;
  document.getElementById('ko-hp-j').textContent   = `${ETAT.hpJoueur} PV`;
  document.getElementById('ko-hp-a').textContent   = `${ETAT.hpAdv} PV`;
  document.getElementById('ko-hp-j').className     = `ko-pl-hp${jg?' win':''}`;
  document.getElementById('ko-hp-a').className     = `ko-pl-hp${!jg?' win':''}`;
  if(jg){ animerApplaudsSpec(3500); if(navigator.vibrate) navigator.vibrate([60,30,60,30,120]); }
  setTimeout(()=>document.getElementById('ko-overlay').classList.add('show'),400);
}

// ══════════════════════════════════════════════════════
//  DÉMARRAGE
// ══════════════════════════════════════════════════════
async function demarrerJeu(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-btns').style.display='flex';
  document.getElementById('life-bars').style.display='flex';
  document.getElementById('hud').style.display='flex';
  document.getElementById('hint').style.opacity='0';
  creerMiiJoueur();
  creerMiiAdv();
  await initMicro();
  setTimeout(()=>demarrerRound(1),500);
}

// ══════════════════════════════════════════════════════
//  BOUCLE DE RENDU
// ══════════════════════════════════════════════════════
let frameCount=0;
const CAM_ORIG=new THREE.Vector3(0,4.5,12);

function animate(){
  requestAnimationFrame(animate);
  frameCount++;

  if(punchPret){
    micLevel=getNiveauMicro();
    document.getElementById('mic-fill').style.width=micLevel+'%';
    document.getElementById('mic-pct').textContent=Math.round(micLevel)+'%';
  }

  if(animSpec){ animSpec.fn(); if(Date.now()>=animSpec.fin){ animSpec=null; SPEC_MIIS.forEach(s=>{ s.brasG.rotation.z=.15; s.brasD.rotation.z=-.15; s.g.position.y=-.55; }); } }
  else{ const t=frameCount*.01; SPEC_MIIS.forEach((s,i)=>{ s.g.position.y=-.55+Math.sin(t+i)*.02; if(ETAT.enCombat&&Math.random()<.003){ s.brasG.rotation.z=.1+Math.random()*.5; s.brasD.rotation.z=-(Math.random()*.5+.1); } }); }

  if(camShake>0){ camera.position.x=CAM_ORIG.x+(Math.random()-.5)*camShake*.04; camera.position.y=CAM_ORIG.y+(Math.random()-.5)*camShake*.02; camShake*=.74; if(camShake<.1){ camera.position.copy(CAM_ORIG); camShake=0; } }

  // Idle boxing : balancement gauche-droite des Miis
  if(miiJ&&ETAT.enCombat){
    miiJ.position.y=-.55+Math.sin(frameCount*.055)*.05;
    miiJ.rotation.y=.3+Math.sin(frameCount*.035)*.07;
  }
  if(miiA&&ETAT.enCombat){
    miiA.position.y=-.55+Math.sin(frameCount*.055+1.2)*.05;
    miiA.rotation.y=-.3+Math.sin(frameCount*.035+1.2)*.07;
  }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

animate();
</script>

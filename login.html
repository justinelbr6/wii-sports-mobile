<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Wii Sports Mobile — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* ══ BASE ══ */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family:'Baloo 2', cursive;
      min-height:100vh;
      background:linear-gradient(160deg, #a8e4f7 0%, #6ec6f0 35%, #b8ecff 100%);
      display:flex; align-items:center; justify-content:center;
      padding:20px; 
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position:relative;
    }

    /* Bulles flottantes — même DA que index.html */
    .bubble {
      position:fixed; border-radius:50%;
      background:rgba(255,255,255,0.18);
      animation:floatUp linear infinite;
      pointer-events:none; z-index:0;
    }
    @keyframes floatUp {
      0%   { transform:translateY(100vh) scale(0); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.5; }
      100% { transform:translateY(-100px) scale(1); opacity:0; }
    }

    /* ══ CARTE PRINCIPALE ══ */
    .card {
      position:relative; z-index:2;
      background:rgba(255,255,255,0.55);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:2px solid rgba(255,255,255,0.8);
      border-radius:32px;
      padding:36px 28px 32px;
      width:100%; max-width:360px;
      box-shadow:0 20px 60px rgba(0,100,180,0.18), 0 4px 12px rgba(0,0,0,0.06);
      display:flex; flex-direction:column; align-items:center;
      gap:0;
    }

    /* ══ LOGO + TITRE ══ */
    .logo-wrap {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      margin-bottom:22px;
    }
    .logo-emoji {
      font-size:4.2rem;
      animation:bounce 1.8s ease-in-out infinite;
      filter:drop-shadow(0 6px 12px rgba(0,100,200,0.25));
    }
    @keyframes bounce {
      0%,100%{ transform:translateY(0) rotate(-3deg); }
      50%    { transform:translateY(-10px) rotate(3deg); }
    }
    .logo-title {
      font-family:'Baloo 2', cursive;
      font-size:2rem; font-weight:800;
      color:#0D47A1;
      text-shadow:0 2px 0 rgba(255,255,255,0.8);
      line-height:1;
    }
    .logo-sub {
      font-size:.78rem; font-weight:700;
      color:rgba(13,71,161,0.5);
      text-transform:uppercase; letter-spacing:1.5px;
    }

    /* ══ SCREENS ══ */
    .screen { display:none; flex-direction:column; align-items:center; gap:14px; width:100%; }
    .screen.active { display:flex; }

    /* ══ FORMULAIRE ══ */
    .form { display:flex; flex-direction:column; gap:10px; width:100%; }

    .field { display:flex; flex-direction:column; gap:4px; }
    .field label {
      font-size:.68rem; font-weight:800;
      color:rgba(13,71,161,0.55);
      text-transform:uppercase; letter-spacing:1.2px;
      padding-left:4px;
    }
    .field input {
      background:rgba(255,255,255,0.7);
      border:2px solid rgba(13,71,161,0.15);
      border-radius:16px; padding:13px 16px;
      font-family:'Baloo 2', cursive; font-size:.95rem;
      color:#0D47A1; outline:none;
      transition:border-color .2s, box-shadow .2s;
      -webkit-appearance:none;
    }
    .field input:focus {
      border-color:#1976D2;
      box-shadow:0 0 0 3px rgba(25,118,210,0.15);
    }
    .field input::placeholder { color:rgba(13,71,161,0.3); }

    /* ══ BOUTON PRINCIPAL ══ */
    .btn-play {
      width:100%; margin-top:4px;
      background:linear-gradient(135deg, #1976D2, #0D47A1);
      color:white; font-family:'Baloo 2', cursive;
      font-size:1.15rem; font-weight:800;
      border:none; border-radius:50px; padding:14px;
      cursor:pointer;
      box-shadow:0 6px 0 #0a2d6e, 0 8px 20px rgba(13,71,161,0.3);
      transition:transform .1s, box-shadow .1s;
      -webkit-appearance:none;
    }
    .btn-play:active {
      transform:translateY(5px);
      box-shadow:0 1px 0 #0a2d6e, 0 4px 10px rgba(13,71,161,0.2);
    }
    .btn-play:disabled { opacity:.5; pointer-events:none; }

    /* ══ MESSAGE ERREUR / SUCCESS ══ */
    .msg {
      font-size:.8rem; font-weight:700;
      padding:10px 14px; border-radius:14px;
      width:100%; text-align:center; display:none;
    }
    .msg.error {
      background:rgba(211,47,47,.12);
      color:#C62828;
      border:1.5px solid rgba(211,47,47,.3);
      display:block;
    }
    .msg.success {
      background:rgba(46,125,50,.12);
      color:#1B5E20;
      border:1.5px solid rgba(46,125,50,.3);
      display:block;
    }

    /* ══ SPINNER ══ */
    .spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:20px 0; }
    .spinner {
      width:36px; height:36px;
      border:4px solid rgba(13,71,161,0.15);
      border-top-color:#1976D2;
      border-radius:50%;
      animation:spin .7s linear infinite;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }
    .spinner-label { font-size:.85rem; font-weight:700; color:rgba(13,71,161,0.5); }

    /* ══ ONBOARDING ══ */
    .onb-title {
      font-family:'Baloo 2', cursive; font-size:1.1rem; font-weight:800;
      color:#0D47A1; text-align:center; line-height:1.3;
    }
    .onb-sub {
      font-size:.78rem; font-weight:700;
      color:rgba(13,71,161,0.5); text-align:center;
    }
    .sport-block { width:100%; }
    .sport-label {
      font-family:'Baloo 2', cursive; font-size:.95rem; font-weight:800;
      color:#1565C0; margin-bottom:6px; padding-left:2px;
    }
    .niv-row { display:flex; gap:7px; }
    .niv-btn {
      flex:1;
      background:rgba(255,255,255,0.7);
      border:2px solid rgba(13,71,161,0.15);
      border-radius:14px; padding:9px 4px;
      font-family:'Baloo 2', cursive; font-size:.82rem; font-weight:700;
      color:rgba(13,71,161,0.6); cursor:pointer;
      transition:all .15s; text-align:center;
      -webkit-appearance:none;
    }
    .niv-btn:active { transform:scale(0.96); }
    .niv-btn.sel {
      background:linear-gradient(135deg, #1976D2, #0D47A1);
      border-color:#0D47A1; color:white;
      box-shadow:0 3px 10px rgba(13,71,161,0.35);
    }

    /* ══ HINT BAS DE PAGE ══ */
    .hint {
      font-size:.72rem; font-weight:700;
      color:rgba(13,71,161,0.4); text-align:center;
      margin-top:4px;
    }
  </style>
</head>
<body>

<!-- Bulles décoratives -->
<script>
  for (let i=0;i<8;i++){
    const b=document.createElement('div'); b.className='bubble';
    const s=20+Math.random()*60;
    b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*6}s;`;
    document.body.appendChild(b);
  }
</script>

<div class="card">

  <!-- Logo commun à tous les écrans -->
  <div class="logo-wrap">
    <div class="logo-emoji">🎮</div>
    <div class="logo-title">Wii Sports</div>
    <div class="logo-sub">Albert School</div>
  </div>

  <!-- ── Écran 1 : Connexion ── -->
  <div class="screen active" id="screen-login">
    <div class="form">
      <div class="field">
        <label>Adresse email</label>
        <input type="email" id="input-email"
          placeholder="prenom@albertschool.com"
          autocomplete="email"
          onkeydown="if(event.key==='Enter') connecter()"/>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="input-password"
          placeholder="••••••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') connecter()"/>
      </div>
    </div>
    <div class="msg" id="msg-login"></div>
    <button class="btn-play" id="btn-login" onclick="connecter()">
      🎮 Se connecter
    </button>
    <p class="hint">Pas encore de compte ? <a href="inscription.html" style="color:#1976D2;font-weight:800;text-decoration:none;">S'inscrire →</a></p>
  </div>

  <!-- ── Écran 2 : Chargement ── -->
  <div class="screen" id="screen-loading">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-label">Connexion en cours…</div>
    </div>
  </div>

  <!-- ── Écran 3 : Onboarding (nouveaux joueurs) ── -->
  <div class="screen" id="screen-onboarding">
    <div class="onb-title">Bienvenue ! 🎉<br>Choisis ton niveau pour chaque sport</div>
    <div class="onb-sub">Tu pourras le changer plus tard selon ta progression.</div>

    <div class="sport-block">
      <div class="sport-label">🎾 Tennis</div>
      <div class="niv-row" id="niv-tennis">
        <button class="niv-btn" onclick="choisirNiv('tennis','Débutant',this)">😊 Débutant</button>
        <button class="niv-btn" onclick="choisirNiv('tennis','Intermédiaire',this)">😤 Intermédiaire</button>
        <button class="niv-btn" onclick="choisirNiv('tennis','Confirmé',this)">💀 Confirmé</button>
      </div>
    </div>

    <div class="sport-block">
      <div class="sport-label">⛳️ golf</div>
      <div class="niv-row" id="niv-golf">
        <button class="niv-btn" onclick="choisirNiv('golf','Débutant',this)">😊 Débutant</button>
        <button class="niv-btn" onclick="choisirNiv('golf','Intermédiaire',this)">😤 Intermédiaire</button>
        <button class="niv-btn" onclick="choisirNiv('golf','Confirmé',this)">💀 Confirmé</button>
      </div>
    </div>

    <div class="sport-block">
      <div class="sport-label">🎳 Bowling</div>
      <div class="niv-row" id="niv-bowling">
        <button class="niv-btn" onclick="choisirNiv('bowling','Débutant',this)">😊 Débutant</button>
        <button class="niv-btn" onclick="choisirNiv('bowling','Intermédiaire',this)">😤 Intermédiaire</button>
        <button class="niv-btn" onclick="choisirNiv('bowling','Confirmé',this)">💀 Confirmé</button>
      </div>
    </div>

    <div class="sport-block">
      <div class="sport-label">🥊 Boxe</div>
      <div class="niv-row" id="niv-boxe">
        <button class="niv-btn" onclick="choisirNiv('boxe','Débutant',this)">😊 Débutant</button>
        <button class="niv-btn" onclick="choisirNiv('boxe','Intermédiaire',this)">😤 Intermédiaire</button>
        <button class="niv-btn" onclick="choisirNiv('boxe','Confirmé',this)">💀 Confirmé</button>
      </div>
      <div class="sport-block">
        <div class="sport-label">⚾ Baseball</div>
        <div class="niv-row" id="niv-baseball">
          <button class="niv-btn" onclick="choisirNiv('baseball','Débutant',this)">😊 Débutant</button>
          <button class="niv-btn" onclick="choisirNiv('baseball','Intermédiaire',this)">😤 Intermédiaire</button>
          <button class="niv-btn" onclick="choisirNiv('baseball','Confirmé',this)">💀 Confirmé</button>
        </div>
    </div>

    <div class="msg" id="msg-onboarding"></div>
    <button class="btn-play" id="btn-onboarding" onclick="validerOnboarding()" disabled>
      🚀 C'est parti !
    </button>
  </div>

</div>

<!-- Supabase CDN — doit être chargé AVANT supabase.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
// ══════════════════════════════════════════════════
//  ÉTAT ONBOARDING
// ══════════════════════════════════════════════════
const choix = { tennis:null, baseball:null, bowling:null, boxe:null ,golf:null};

// ══════════════════════════════════════════════════
//  NAVIGATION ENTRE ÉCRANS
// ══════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function affMsg(elId, texte, type) {
  const el = document.getElementById(elId);
  el.textContent = texte;
  el.className = `msg ${type}`;
}

// ══════════════════════════════════════════════════
//  CONNEXION
// ══════════════════════════════════════════════════
async function connecter() {
  const email    = document.getElementById('input-email').value.trim().toLowerCase();
  const password = document.getElementById('input-password').value;

  if (!email || !password) {
    affMsg('msg-login', 'Remplis les deux champs.', 'error');
    return;
  }

  document.getElementById('btn-login').disabled = true;
  showScreen('screen-loading');

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    showScreen('screen-login');
    document.getElementById('btn-login').disabled = false;
    affMsg('msg-login', traduireErreur(error.message), 'error');
    return;
  }

  await routerApresConnexion(data.user);
}

// ══════════════════════════════════════════════════
//  ROUTER : onboarding ou menu ?
// ══════════════════════════════════════════════════
async function routerApresConnexion(user) {
  showScreen('screen-loading');

  const { data: profil, error } = await supabaseClient
    .from('profiles')
    .select('onboarding_done, full_name')
    .eq('id', user.id)
    .single();

  // Si erreur ou profil absent → onboarding
  if (error || !profil || !profil.onboarding_done) {
    showScreen('screen-onboarding');
    return;
  }

  // Profil OK → menu principal
  window.location.href = 'index.html';
}

// ══════════════════════════════════════════════════
//  ONBOARDING
// ══════════════════════════════════════════════════
function choisirNiv(sport, niveau, btn) {
  document.querySelectorAll(`#niv-${sport} .niv-btn`).forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  choix[sport] = niveau;
  if (navigator.vibrate) navigator.vibrate(10);

  // Activer le bouton seulement quand les 4 sports sont choisis
  const ok = Object.values(choix).every(v => v !== null);
  document.getElementById('btn-onboarding').disabled = !ok;
}

async function validerOnboarding() {
  const ok = Object.values(choix).every(v => v !== null);
  if (!ok) {
    affMsg('msg-onboarding', 'Choisis un niveau pour chaque sport !', 'error');
    return;
  }

  document.getElementById('btn-onboarding').disabled = true;
  showScreen('screen-loading');

  const { data: { user } } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient
    .from('profiles')
    .upsert({
      id:              user.id,
      email:           user.email,
      full_name:       user.user_metadata?.full_name || user.email.split('@')[0],
      level_tennis:    choix.tennis,
      level_baseball:  choix.baseball,
      level_bowling:   choix.bowling,
      level_boxe:      choix.boxe,
      level_golf:      choix.golf,
      onboarding_done: true,
    }, { onConflict: 'id' });

  if (error) {
    console.error('Erreur Supabase onboarding:', error);
    showScreen('screen-onboarding');
    document.getElementById('btn-onboarding').disabled = false;
    affMsg('msg-onboarding', `Erreur de sauvegarde: ${error.message}`, 'error');
    return;
  }

  window.location.href = 'index.html';
}

// ══════════════════════════════════════════════════
//  AUTO-LOGIN si session active
// ══════════════════════════════════════════════════
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    await routerApresConnexion(session.user);
  }
})();

// ══════════════════════════════════════════════════
//  TRADUCTION DES ERREURS SUPABASE
// ══════════════════════════════════════════════════
function traduireErreur(msg) {
  if (msg.includes('Invalid login credentials')) return '❌ Email ou mot de passe incorrect.';
  if (msg.includes('Email not confirmed'))        return '📧 Confirme ton email avant de te connecter.';
  if (msg.includes('Too many requests'))          return '⏳ Trop de tentatives. Attends 1 minute.';
  if (msg.includes('User not found'))             return '❌ Aucun compte trouvé avec cet email.';
  return '❌ Erreur de connexion. Réessaie.';
}
</script>
</body>
</html>
